<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>FERAL // Survival</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07100c; --bg-panel: #0f1814; --bg-inset: #0a1210;
    --border: #24342b; --border-bright: #3d5447;
    --text: #d4c5a0; --text-dim: #8a9b8e; --text-faded: #4a5651;
    --amber: #ffb347; --amber-dim: #b87a28; --amber-bright: #ffd079;
    --green: #7cbd56; --green-dim: #4d7a33;
    --red: #d35454; --red-dim: #8a2828;
    --blue: #6ab0c4; --purple: #a87ec8;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --display: 'VT323', 'JetBrains Mono', monospace;
    --rar-common: #9aa59a; --rar-uncommon: #7cbd56; --rar-rare: #6ab0c4;
    --rar-epic: #a87ec8; --rar-legendary: #ffb347; --rar-mythic: #ff6b6b;
    --t-fire: #ff6b35; --t-water: #4a9dff; --t-earth: #a0522d;
    --t-air: #c2e8ff; --t-nature: #7cbd56; --t-shadow: #6b4780;
    --t-light: #ffd966; --t-metal: #c0c0c0; --t-toxic: #a06ec8;
    --t-arcane: #e066c8; --t-normal: #b8b8a0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; overflow: hidden; background: var(--bg);
    color: var(--text); font-family: var(--mono); font-size: 13px;
    -webkit-tap-highlight-color: transparent;
    user-select: none; -webkit-user-select: none;
  }
  body {
    background:
      radial-gradient(ellipse at 20% 10%, rgba(255,179,71,0.04), transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(124,189,86,0.03), transparent 50%),
      var(--bg);
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0.08) 0, rgba(0,0,0,0.08) 1px, transparent 1px, transparent 3px);
    z-index: 9999; opacity: 0.35;
  }

  /* LOGIN */
  #login {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--bg); z-index: 100; padding: 20px;
  }
  #login h1 {
    font-family: var(--display); font-size: 88px; letter-spacing: 10px;
    color: var(--amber);
    text-shadow: 0 0 22px rgba(255,179,71,0.6), 0 0 44px rgba(255,179,71,0.25);
    margin-bottom: 4px;
  }
  #login .subtitle {
    font-size: 11px; letter-spacing: 5px; color: var(--text-dim);
    margin-bottom: 36px; text-transform: uppercase;
  }
  #login .box {
    background: var(--bg-panel); border: 1px solid var(--border);
    padding: 24px; max-width: 400px; width: 100%;
    box-shadow: 0 0 50px rgba(0,0,0,0.5);
  }
  #login label {
    display: block; font-size: 10px; letter-spacing: 2px;
    color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px;
  }
  #login input {
    width: 100%; background: var(--bg-inset);
    border: 1px solid var(--border); color: var(--text);
    font-family: var(--mono); font-size: 14px;
    padding: 10px 12px; margin-bottom: 16px; outline: none;
  }
  #login input:focus { border-color: var(--amber); box-shadow: 0 0 0 1px rgba(255,179,71,0.2); }
  #login button {
    width: 100%; background: var(--amber); color: var(--bg);
    border: none; font-family: var(--mono); font-weight: 700;
    font-size: 13px; letter-spacing: 2px; padding: 12px;
    cursor: pointer; text-transform: uppercase;
  }
  #login button:hover { background: var(--amber-bright); }
  #login button:disabled { opacity: 0.5; cursor: not-allowed; }
  #login .status { margin-top: 16px; font-size: 11px; color: var(--text-dim); text-align: center; min-height: 14px; }
  #login .err { color: var(--red); }
  #login .footer { margin-top: 28px; font-size: 10px; color: var(--text-faded); text-align: center; letter-spacing: 1px; line-height: 1.8; }

  /* MAIN GAME LAYOUT */
  #game { display: none; height: 100vh; width: 100vw; }
  #game.active { display: grid; grid-template-columns: 1fr 360px; }
  @media (max-width: 860px) { #game.active { grid-template-columns: 1fr; grid-template-rows: 1fr auto; } }

  #world-wrap {
    position: relative; overflow: hidden;
    background: var(--bg-inset); border-right: 1px solid var(--border);
  }
  @media (max-width: 860px) { #world-wrap { border-right: none; border-bottom: 1px solid var(--border); } }
  #world-wrap.interior { background: linear-gradient(180deg, #2a1a0d 0%, #140a04 100%); }
  #world { display: block; image-rendering: pixelated; position: absolute; }

  /* HUD */
  .hud {
    position: absolute; background: rgba(7,16,12,0.88);
    border: 1px solid var(--border); padding: 8px 12px;
    backdrop-filter: blur(4px); font-size: 11px; pointer-events: none;
  }
  #hud-top-left { top: 10px; left: 10px; min-width: 170px; z-index: 5; }
  .hud-row { display: flex; justify-content: space-between; gap: 16px; line-height: 1.6; }
  .hud-label { color: var(--text-dim); letter-spacing: 1px; }
  .hud-val { color: var(--amber); font-weight: 700; }
  .hud-val.green { color: var(--green); } .hud-val.red { color: var(--red); } .hud-val.blue { color: var(--blue); }

  #hud-time {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    background: rgba(7,16,12,0.88); border: 1px solid var(--border);
    padding: 6px 14px; font-size: 11px; backdrop-filter: blur(4px);
    letter-spacing: 2px; z-index: 5;
  }
  #hud-time .phase { color: var(--amber); font-weight: 700; }
  #hud-time .phase.night { color: var(--blue); }

  #minimap {
    position: absolute; top: 10px; right: 10px;
    width: 170px; height: 170px;
    background: rgba(7,16,12,0.88); border: 1px solid var(--border);
    backdrop-filter: blur(4px); z-index: 5;
  }
  @media (max-width: 860px) { #minimap { width: 110px; height: 110px; } }

  #hint {
    position: absolute; bottom: 70px; left: 50%;
    transform: translateX(-50%);
    background: rgba(7,16,12,0.95); border: 1px solid var(--amber);
    padding: 8px 16px; font-size: 12px; color: var(--amber);
    letter-spacing: 1px; text-transform: uppercase;
    display: none; pointer-events: none;
    box-shadow: 0 0 20px rgba(255,179,71,0.35);
    white-space: nowrap; z-index: 5;
  }
  #hint.show { display: block; animation: hintPulse 2s ease-in-out infinite; }
  @keyframes hintPulse { 0%,100%{opacity:0.85} 50%{opacity:1} }

  #log {
    position: absolute; bottom: 10px; left: 10px;
    width: 380px; max-width: calc(100% - 20px);
    max-height: 140px; background: rgba(7,16,12,0.88);
    border: 1px solid var(--border); backdrop-filter: blur(4px);
    overflow-y: auto; font-size: 11px; line-height: 1.6; padding: 8px 12px;
    z-index: 5;
  }
  @media (max-width: 860px) { #log { max-height: 80px; width: 240px; } }
  #log::-webkit-scrollbar { width: 4px; }
  #log::-webkit-scrollbar-track { background: transparent; }
  #log::-webkit-scrollbar-thumb { background: var(--border-bright); }
  .log-entry { margin-bottom: 2px; }
  .log-time { color: var(--text-faded); margin-right: 8px; }
  .log-info { color: var(--text); } .log-good { color: var(--green); }
  .log-bad { color: var(--red); } .log-system { color: var(--amber); }
  .log-raid { color: var(--purple); }

  /* D-PAD */
  #dpad {
    position: absolute; bottom: 20px; right: 20px; display: none;
    grid-template-columns: repeat(3, 52px); grid-template-rows: repeat(3, 52px);
    gap: 2px; z-index: 6;
  }
  @media (hover: none) and (pointer: coarse) { #dpad { display: grid; } }
  .dpad-btn {
    background: rgba(20,26,24,0.85); border: 1px solid var(--border-bright);
    color: var(--amber); font-family: var(--mono); font-size: 18px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    user-select: none; -webkit-user-select: none;
  }
  .dpad-btn:active { background: rgba(255,179,71,0.2); }
  .dpad-btn.empty { visibility: hidden; }

  /* FLOATING DAMAGE TEXT */
  .dmg-text {
    position: absolute; pointer-events: none;
    font-family: var(--display); font-size: 22px; font-weight: 700;
    text-shadow: 0 0 6px #000, 0 0 2px #000;
    animation: dmgFloat 1.2s ease-out forwards;
    z-index: 8;
  }
  .dmg-text.red { color: var(--red); }
  .dmg-text.green { color: var(--green); }
  .dmg-text.gold { color: var(--amber); }
  @keyframes dmgFloat {
    0%   { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-40px); opacity: 0; }
  }

  /* SIDE PANEL */
  #panel {
    background: var(--bg-panel); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  @media (max-width: 860px) { #panel { border-left: none; max-height: 44vh; } }

  .brand {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .brand .logo {
    font-family: var(--display); font-size: 26px; letter-spacing: 5px;
    color: var(--amber); text-shadow: 0 0 10px rgba(255,179,71,0.35);
  }
  .brand .nickname { font-size: 11px; color: var(--text-dim); text-align: right; }
  .brand .nickname .name { color: var(--green); font-weight: 700; }
  .brand .nickname .gold { color: var(--amber); }

  .tabs {
    display: grid; grid-template-columns: repeat(7, 1fr);
    border-bottom: 1px solid var(--border); background: var(--bg-inset);
  }
  .tab {
    padding: 10px 2px; text-align: center;
    font-size: 9px; letter-spacing: 1px;
    color: var(--text-dim); cursor: pointer;
    border-right: 1px solid var(--border);
    text-transform: uppercase; font-weight: 500;
  }
  .tab:last-child { border-right: none; }
  .tab.active { color: var(--amber); background: var(--bg-panel); box-shadow: inset 0 2px 0 var(--amber); }
  .tab:hover:not(.active) { color: var(--text); }

  .tab-content { flex: 1; overflow-y: auto; padding: 16px; }
  .tab-content::-webkit-scrollbar { width: 6px; }
  .tab-content::-webkit-scrollbar-track { background: var(--bg-inset); }
  .tab-content::-webkit-scrollbar-thumb { background: var(--border-bright); }

  .section-title {
    font-size: 10px; letter-spacing: 2px; color: var(--text-dim);
    text-transform: uppercase; margin: 0 0 10px; padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .section-title:not(:first-child) { margin-top: 16px; }

  .stat-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 6px 12px; font-size: 11px; margin-bottom: 10px;
  }
  .stat-grid .k { color: var(--text-dim); }
  .stat-grid .v { color: var(--amber); text-align: right; font-weight: 700; }
  .stat-grid .v.green { color: var(--green); } .stat-grid .v.red { color: var(--red); }

  .inv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 8px; }
  .inv-slot {
    background: var(--bg-inset); border: 1px solid var(--border);
    padding: 8px 6px; text-align: center; font-size: 10px;
    position: relative; min-height: 56px; cursor: default;
  }
  .inv-slot .icon { font-size: 20px; line-height: 1; }
  .inv-slot .name { color: var(--text-dim); margin-top: 4px; font-size: 9px; letter-spacing: 0.5px; }
  .inv-slot .count {
    position: absolute; top: 4px; right: 6px;
    font-weight: 700; color: var(--amber); font-size: 11px;
  }
  .inv-slot.empty { opacity: 0.3; }
  .inv-slot.clickable { cursor: pointer; }
  .inv-slot.clickable:hover { border-color: var(--amber); }

  .creature-card {
    background: var(--bg-inset); border: 1px solid var(--border);
    padding: 10px; margin-bottom: 6px;
    display: grid; grid-template-columns: 42px 1fr auto;
    gap: 10px; align-items: center; cursor: pointer;
    position: relative;
  }
  .creature-card:hover { border-color: var(--border-bright); }
  .creature-card.in-party { border-color: var(--amber-dim); background: rgba(255,179,71,0.06); }
  .creature-card.assigned { border-color: var(--blue); }
  .creature-card .sprite { font-size: 28px; text-align: center; line-height: 1; }
  .creature-card .info { min-width: 0; }
  .creature-card .row-1 { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; gap: 6px; align-items: center; }
  .creature-card .species { color: var(--text); font-weight: 700; }
  .creature-card .lvl { color: var(--amber); font-size: 10px; }
  .creature-card .stats-mini { font-size: 9px; color: var(--text-dim); letter-spacing: 0.5px; }
  .creature-card .party-badge {
    background: var(--amber); color: var(--bg);
    font-size: 8px; padding: 2px 5px; font-weight: 700;
  }
  .creature-card .hp-bar {
    height: 3px; background: var(--bg);
    margin-top: 3px; position: relative; border: 1px solid var(--border);
  }
  .creature-card .hp-bar-fill { position: absolute; inset: 0; background: var(--red); transform-origin: left; }

  .rar-common { color: var(--rar-common); }
  .rar-uncommon { color: var(--rar-uncommon); }
  .rar-rare { color: var(--rar-rare); }
  .rar-epic { color: var(--rar-epic); }
  .rar-legendary { color: var(--rar-legendary); text-shadow: 0 0 4px var(--rar-legendary); }
  .rar-mythic { color: var(--rar-mythic); text-shadow: 0 0 6px var(--rar-mythic); }

  .type-badge {
    display: inline-block; font-size: 9px;
    padding: 1px 6px; letter-spacing: 1px;
    text-transform: uppercase; font-weight: 700;
    color: #fff; border-radius: 2px;
  }
  .type-fire { background: var(--t-fire); }
  .type-water { background: var(--t-water); }
  .type-earth { background: var(--t-earth); }
  .type-air { background: var(--t-air); color: #333; }
  .type-nature { background: var(--t-nature); color: #222; }
  .type-shadow { background: var(--t-shadow); }
  .type-light { background: var(--t-light); color: #222; }
  .type-metal { background: var(--t-metal); color: #222; }
  .type-toxic { background: var(--t-toxic); }
  .type-arcane { background: var(--t-arcane); }
  .type-normal { background: var(--t-normal); color: #222; }

  .recipe, .equip-card {
    background: var(--bg-inset); border: 1px solid var(--border);
    padding: 10px; margin-bottom: 8px; cursor: pointer;
  }
  .recipe:hover, .equip-card:hover { border-color: var(--amber); }
  .recipe.disabled, .equip-card.disabled { opacity: 0.4; cursor: not-allowed; }
  .recipe.disabled:hover, .equip-card.disabled:hover { border-color: var(--border); }
  .recipe .head, .equip-card .head {
    display: flex; justify-content: space-between;
    font-size: 12px; font-weight: 700; color: var(--text);
    margin-bottom: 4px; align-items: center;
  }
  .recipe .icon, .equip-card .icon { font-size: 16px; margin-right: 4px; }
  .recipe .cost, .equip-card .cost {
    font-size: 10px; color: var(--text-dim); letter-spacing: 0.5px;
  }
  .recipe .cost .have { color: var(--green); }
  .recipe .cost .need { color: var(--red); }
  .equip-card .level-badge {
    font-size: 9px; color: var(--amber);
    background: rgba(255,179,71,0.1);
    padding: 2px 6px; border: 1px solid var(--amber-dim);
    margin-left: auto; margin-right: 8px;
  }
  .equip-card.owned { border-color: var(--green-dim); }

  .empty-state {
    text-align: center; color: var(--text-faded);
    padding: 30px 10px; font-size: 11px; font-style: italic;
  }

  .base-card {
    background: var(--bg-inset); border: 1px solid var(--amber-dim);
    padding: 12px; margin-bottom: 12px; position: relative;
  }
  .base-card .lvl-tag {
    position: absolute; top: -1px; right: -1px;
    background: var(--amber); color: var(--bg);
    font-size: 9px; font-weight: 700;
    padding: 2px 8px; letter-spacing: 1px;
  }
  .base-card .title {
    font-family: var(--display); font-size: 22px;
    color: var(--amber); letter-spacing: 2px; margin-bottom: 6px;
  }
  .base-card .coords { font-size: 10px; color: var(--text-dim); margin-bottom: 10px; }
  .base-card .upgrade-info { font-size: 10px; color: var(--text-dim); line-height: 1.5; }
  .base-card .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 10px; }

  /* MODAL */
  #modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.8);
    display: none; align-items: center; justify-content: center;
    z-index: 50; backdrop-filter: blur(3px); padding: 20px;
  }
  #modal-bg.open { display: flex; }
  .modal {
    background: var(--bg-panel); border: 1px solid var(--border-bright);
    max-width: 520px; width: 100%;
    box-shadow: 0 10px 50px rgba(0,0,0,0.7);
    max-height: 92vh; display: flex; flex-direction: column;
  }
  .modal.wide { max-width: 680px; }
  .modal-head {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-title { font-family: var(--display); font-size: 24px; letter-spacing: 3px; color: var(--amber); }
  .modal-close {
    background: none; border: none; color: var(--text-dim);
    cursor: pointer; font-family: var(--mono); font-size: 20px;
    padding: 4px 8px;
  }
  .modal-body { padding: 16px; overflow-y: auto; flex: 1; }
  /* Battle input lock: when phase is resolving, no buttons can be clicked */
  .modal.battle-locked .battle-action-bar button,
  .modal.battle-locked .battle-action-bar .btn,
  .modal.battle-locked .battle-moves button,
  .modal.battle-locked .battle-moves .btn,
  .modal.battle-locked .battle-party-pick button,
  .modal.battle-locked .battle-party-pick .btn { pointer-events: none; opacity: 0.55; cursor: wait; }
  .modal-btns {
    padding: 12px 16px; border-top: 1px solid var(--border);
    display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap;
  }

  .btn {
    background: var(--bg-inset); border: 1px solid var(--border-bright);
    color: var(--text); font-family: var(--mono);
    font-size: 11px; letter-spacing: 1px;
    padding: 8px 14px; cursor: pointer; text-transform: uppercase;
  }
  .btn:hover { border-color: var(--amber); color: var(--amber); }
  .btn.primary { background: var(--amber); color: var(--bg); border-color: var(--amber); font-weight: 700; }
  .btn.primary:hover { background: var(--amber-bright); color: var(--bg); }
  .btn.danger { background: var(--red-dim); color: var(--text); border-color: var(--red); }
  .btn.danger:hover { background: var(--red); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* BATTLE UI */
  .battle-arena {
    padding: 12px; background: var(--bg-inset);
    border: 1px solid var(--border); margin-bottom: 10px;
    position: relative; overflow: hidden;
  }
  .battle-arena::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, rgba(255,179,71,0.05) 0%, transparent 70%);
    pointer-events: none;
  }
  .battle-row {
    display: grid; grid-template-columns: 1fr auto 1fr;
    align-items: center; gap: 12px;
  }
  .battle-side { text-align: center; position: relative; z-index: 1; }
  .battle-sprite { font-size: 52px; line-height: 1; margin-bottom: 4px; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5)); }
  .battle-name { font-weight: 700; color: var(--text); font-size: 13px; }
  .battle-sublabel { font-size: 9px; color: var(--text-dim); letter-spacing: 1px; }
  .battle-hp-wrap { margin-top: 4px; }
  .battle-hp-bar { height: 8px; background: var(--bg); border: 1px solid var(--border); position: relative; }
  .battle-hp-fill {
    position: absolute; inset: 0; background: var(--green);
    transform-origin: left; transition: transform 0.35s ease, background 0.2s;
  }
  .battle-hp-fill.mid { background: var(--amber); }
  .battle-hp-fill.low { background: var(--red); }
  .battle-hp-text { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
  .battle-vs { font-family: var(--display); font-size: 32px; color: var(--amber); letter-spacing: 2px; }
  .battle-status-icons { font-size: 14px; margin-top: 2px; min-height: 18px; }

  #battle-log {
    max-height: 110px; min-height: 60px; overflow-y: auto;
    font-size: 11px; line-height: 1.6; padding: 8px;
    background: var(--bg-inset); border: 1px solid var(--border);
    margin-bottom: 10px;
  }
  #battle-log::-webkit-scrollbar { width: 4px; }
  #battle-log::-webkit-scrollbar-thumb { background: var(--border-bright); }
  .move-btn {
    background: var(--bg-inset); border: 1px solid var(--border-bright);
    padding: 8px; cursor: pointer; text-align: left;
    display: flex; flex-direction: column; gap: 2px;
    font-family: var(--mono); color: var(--text);
  }
  .move-btn:hover { border-color: var(--amber); }
  .move-btn:disabled, .move-btn.disabled { opacity: 0.3; cursor: not-allowed; }

// UTILITIES
// ============================================================
function mulberry32(seed) {
  return function() {
    let t = seed += 0x6D2B79F5;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function noise2(x, y, seed) { const r = mulberry32(seed + x * 374761 + y * 668265263); return r(); }
function smoothNoise(x, y, seed, scale) {
  const sx = x / scale, sy = y / scale;
  const ix = Math.floor(sx), iy = Math.floor(sy);
  const fx = sx - ix, fy = sy - iy;
  const a = noise2(ix, iy, seed), b = noise2(ix + 1, iy, seed);
  const c = noise2(ix, iy + 1, seed), d = noise2(ix + 1, iy + 1, seed);
  const sFx = fx * fx * (3 - 2 * fx), sFy = fy * fy * (3 - 2 * fy);
  const ab = a + (b - a) * sFx, cd = c + (d - c) * sFx;
  return ab + (cd - ab) * sFy;
}
function randInt(lo, hi) { return lo + Math.floor(Math.random() * (hi - lo + 1)); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function xpForLevel(lvl) { return Math.floor(lvl * lvl * lvl * 0.8); }
function levelFromXp(xp) { let lvl = 1; while (xpForLevel(lvl + 1) <= xp && lvl < 100) lvl++; return lvl; }
function calcStat(kind, base, iv, lvl) {
  if (kind === 'hp') return Math.floor(((2 * base + iv) * lvl) / 100) + lvl + 10;
  return Math.floor(((2 * base + iv) * lvl) / 100) + 5;
}

// ============================================================
// UNIFIED INVENTORY LAYER
// All item reads/writes go through these helpers.
// `me.inv` is the single source of truth for item counts.
// `me.gold` is currency, kept separate.
// `me.equip` is the equipped slot map.
// ============================================================
function consolidateInventory(p) {
  // Idempotent: merge legacy me.tools + me.inventory into me.inv, then drop the old buckets.
  if (!p.inv || typeof p.inv !== 'object') p.inv = {};
  if (p.inventory && typeof p.inventory === 'object') {
    for (const [k, v] of Object.entries(p.inventory)) {
      const n = Number(v) || 0;
      if (n > 0) p.inv[k] = (p.inv[k] || 0) + n;
    }
    delete p.inventory;
  }
  if (p.tools && typeof p.tools === 'object') {
    for (const [k, v] of Object.entries(p.tools)) {
      const n = Number(v) || 0;
      if (n > 0) p.inv[k] = (p.inv[k] || 0) + n;
    }
    delete p.tools;
  }
  // Drop any non-positive entries
  for (const [k, v] of Object.entries(p.inv)) {
    if (!v || v <= 0 || isNaN(v)) delete p.inv[k];
  }
  // Make sure equip exists
  if (!p.equip || typeof p.equip !== 'object') p.equip = {};
  // Make sure gold is a clean number
  if (typeof p.gold !== 'number' || isNaN(p.gold) || p.gold < 0) p.gold = 0;
}
function invHave(key) {
  if (!me) return 0;
  if (key === 'gold') return me.gold || 0;
  return (me.inv && me.inv[key]) || 0;
}
function invAdd(key, qty = 1) {
  if (!me) return;
  if (qty <= 0) return;
  if (key === 'gold') { me.gold = (me.gold || 0) + qty; return; }
  if (!me.inv) me.inv = {};
  me.inv[key] = (me.inv[key] || 0) + qty;
}
function invRemove(key, qty = 1) {
  if (!me) return false;
  if (key === 'gold') {
    if ((me.gold || 0) < qty) return false;
    me.gold -= qty; return true;
  }
  if (!me.inv || (me.inv[key] || 0) < qty) return false;
  me.inv[key] -= qty;
  if (me.inv[key] <= 0) delete me.inv[key];
  return true;
}
function canAfford(cost) {
  if (!cost) return true;
  for (const [k, v] of Object.entries(cost)) {
    if (invHave(k) < v) return false;
  }
  return true;
}
function payCost(cost) {
  if (!cost) return true;
  if (!canAfford(cost)) return false;
  for (const [k, v] of Object.entries(cost)) invRemove(k, v);
  return true;
}

function generateWorld(seed) {
  const w = [];
  for (let y = 0; y < WORLD_SIZE; y++) {
    const row = [];
    for (let x = 0; x < WORLD_SIZE; x++) {
      const h = smoothNoise(x, y, seed, 18);
      const m = smoothNoise(x, y, seed + 1000, 7);
      const d = smoothNoise(x, y, seed + 2000, 22);
      const t = smoothNoise(x, y, seed + 3500, 32);  // temperature for tundra
      let biome = 'grass', resource = null;
      if (h < 0.3) biome = 'water';
      else if (h < 0.38) biome = 'sand';
      else if (h > 0.74) biome = 'mountain';
      else if (t > 0.72 && h > 0.4) biome = 'tundra';
      else if (m > 0.62) biome = 'forest';
      else if (m > 0.5 && h < 0.5) biome = 'swamp';
      if (d > 0.82 && biome !== 'water' && biome !== 'sand') biome = 'cave';

      if (biome !== 'water') {
        const r = noise2(x, y, seed + 3000);
        if (biome === 'forest' && r < 0.28) resource = 'tree';
        else if (biome === 'forest' && r > 0.88 && r < 0.93) resource = 'herb';
        else if (biome === 'forest' && r > 0.93) resource = 'berry';
        else if (biome === 'grass' && r < 0.10) resource = 'tree';
        else if (biome === 'grass' && r > 0.88 && r < 0.93) resource = 'berry';
        else if (biome === 'grass' && r > 0.93) resource = 'herb';
        else if (biome === 'mountain' && r < 0.18) resource = 'rock';
        else if (biome === 'mountain' && r > 0.84 && r < 0.90) resource = 'copper';
        else if (biome === 'mountain' && r > 0.94) resource = 'iron';
        else if (biome === 'cave' && r < 0.14) resource = 'rock';
        else if (biome === 'cave' && r > 0.72 && r < 0.82) resource = 'copper';
        else if (biome === 'cave' && r > 0.84 && r < 0.92) resource = 'iron';
        else if (biome === 'cave' && r > 0.94 && r < 0.97) resource = 'gold_o';
        else if (biome === 'cave' && r > 0.985) resource = 'crystal';
        else if (biome === 'sand' && r > 0.85) resource = 'shell';
        else if (biome === 'tundra' && r > 0.82) resource = 'ice';
        else if (biome === 'swamp' && r > 0.82) resource = 'herb';
      }
      row.push({ biome, resource, x, y });
    }
    w.push(row);
  }
  return w;
}

function pickSpeciesForBiome(biome, rng, isNight) {
  const candidates = [];
  for (const [key, sp] of Object.entries(SPECIES)) {
    if (key.startsWith('_')) continue;
    if (!sp.b.includes(biome)) continue;
    // Only base forms spawn wild
    const isEvoForm = Object.values(SPECIES).some(other => other.evo && other.evo.to === key);
    if (isEvoForm) continue;
    let weight = RARITY_WEIGHTS[sp.r];
    if (sp.nocturnal) weight *= (isNight ? 1.8 : 0.35);
    else weight *= (isNight ? 0.7 : 1.0);
    candidates.push({ key, weight });
  }
  if (!candidates.length) return null;
  let total = 0;
  for (const c of candidates) total += c.weight;
  let r = rng() * total;
  for (const c of candidates) { r -= c.weight; if (r <= 0) return c.key; }
  return candidates[0].key;
}

function generateWildlifePlan(world, seed, count = 950) {
  const rng = mulberry32(seed + 99999);
  const anchors = {};
  let attempts = 0;
  while (Object.keys(anchors).length < count && attempts < count * 6) {
    attempts++;
    const x = Math.floor(rng() * WORLD_SIZE);
    const y = Math.floor(rng() * WORLD_SIZE);
    const tile = world[y][x];
    if (!BIOMES[tile.biome].walkable) continue;
    if (tile.resource) continue;
    const key = pickSpeciesForBiome(tile.biome, rng, false);
    if (!key) continue;
    const anchorId = `${x}_${y}`;
    if (anchors[anchorId]) continue;
    const sp = SPECIES[key];
    const rarityFloor = { common:1, uncommon:5, rare:12, epic:22, legendary:32, mythic:42 }[sp.r] || 1;
    const level = rarityFloor + Math.floor(rng() * 8);
    anchors[anchorId] = { x, y, species: key, level };
  }
  return anchors;
}

const NPC_NAMES = ['Cora','Jasper','Willa','Finn','Mira','Otto','Sable','Ren','Tess','Dune','Bram','Nova','Gil','Pip','Quin','Rook','Sol','Tav','Uma','Vex'];
const NPC_GLYPHS = ['🧔','👩','🧑‍🌾','👨‍⚕️','👩‍🍳','🧙','🧑‍🎨','👩‍🔧','👴','👵','🧑‍🏫','👨‍🎓'];
const VILLAGE_NAMES = ['Oakhollow','Stonebrook','Millford','Ashenvale','Redmoor','Greenhaven','Ironhold','Seabrook','Frostpeak','Thornvale'];

function generateVillages(world, seed) {
  const rng = mulberry32(seed + 777777);
  const villages = [];
  let tries = 0;
  const minDist = 50;
  while (villages.length < VILLAGE_NAMES.length && tries++ < 5000) {
    const x = 25 + Math.floor(rng() * (WORLD_SIZE - 50));
    const y = 25 + Math.floor(rng() * (WORLD_SIZE - 50));
    const tile = world[y]?.[x];
    if (!tile || tile.biome === 'water' || tile.biome === 'cave') continue;
    if (tile.resource) continue;
    if (villages.some(v => Math.abs(v.x - x) + Math.abs(v.y - y) < minDist)) continue;
    let ok = true;
    for (let dy = -2; dy <= 2 && ok; dy++) for (let dx = -2; dx <= 2 && ok; dx++) {
      const t = world[y+dy]?.[x+dx];
      if (!t || !BIOMES[t.biome].walkable) ok = false;
    }
    if (!ok) continue;
    const vid = `v${villages.length}`;
    const name = VILLAGE_NAMES[villages.length];
    const npcCount = 2 + Math.floor(rng() * 2);
    const npcs = [];
    const usedNames = new Set();
    for (let i = 0; i < npcCount; i++) {
      let nName; do { nName = NPC_NAMES[Math.floor(rng() * NPC_NAMES.length)]; } while (usedNames.has(nName));
      usedNames.add(nName);
      const ng = NPC_GLYPHS[Math.floor(rng() * NPC_GLYPHS.length)];
      let nx = x, ny = y, placed = false;
      for (let attempt = 0; attempt < 40 && !placed; attempt++) {
        const dx = Math.floor(rng() * 7) - 3, dy = Math.floor(rng() * 7) - 3;
        if (dx === 0 && dy === 0) continue;
        const candT = world[y+dy]?.[x+dx];
        if (candT && BIOMES[candT.biome].walkable && !candT.resource) {
          nx = x + dx; ny = y + dy; placed = true;
        }
      }
      if (!placed) { nx = x + 1; ny = y + 1; }
      const npcId = `${vid}_n${i}`;
      npcs.push({
        id: npcId, villageId: vid, x: nx, y: ny, name: nName, glyph: ng,
        quest: generateQuestForNpc(rng),
        dialogue: ['Greetings, traveler.','The wilds stir again.','Be cautious out there.','Stay on the paths.','These are dark times.','Something ancient wakes...'][Math.floor(rng()*6)]
      });
    }
    villages.push({ id: vid, x, y, name, npcs });
  }
  return villages;
}

function generateQuestForNpc(rng) {
  const types = ['fetch','defeat','battle'];
  const type = types[Math.floor(rng() * types.length)];
  if (type === 'fetch') {
    const items = ['wood','stone','copper','iron','food','herb'];
    const item = items[Math.floor(rng() * items.length)];
    const amt = { wood:20, stone:15, copper:8, iron:4, food:25, herb:10 }[item];
    return { type, item, amount: amt, reward: { gold: 50 + Math.floor(rng()*80) }, description: `Bring me ${amt} ${ITEMS[item].name}.` };
  }
  if (type === 'defeat') {
    const ts = ['fire','water','earth','nature','shadow','toxic'];
    const t = ts[Math.floor(rng()*ts.length)];
    const amt = 3 + Math.floor(rng()*3);
    return { type, elementType: t, amount: amt, reward: { gold: 80 + Math.floor(rng()*120) }, description: `Defeat ${amt} ${t}-type creatures in the wild.` };
  }
  const speciesPool = Object.keys(SPECIES).filter(k => !k.startsWith('_') && ['uncommon','rare'].includes(SPECIES[k].r));
  const speciesKey = speciesPool[Math.floor(rng()*speciesPool.length)];
  const lvl = 12 + Math.floor(rng()*20);
  const reward = rng() < 0.3
    ? { egg: Object.keys(SPECIES).filter(k => !k.startsWith('_') && ['rare','epic'].includes(SPECIES[k].r))[Math.floor(rng()*8)], gold: 50 }
    : { gold: 120 + Math.floor(rng()*150) };
  return { type, speciesKey, lvl, reward, description: `Beat me in a creature battle.` };
}

// ============================================================
function makeCreatureInstance(speciesKey, level = 1, ivs = null) {
  const sp = SPECIES[speciesKey];
  if (!sp) return null;
  if (!ivs) ivs = { hp: randInt(0,31), atk: randInt(0,31), def: randInt(0,31), spd: randInt(0,31) };
  const learnset = sp.mv.filter(m => m[0] <= level).slice(-4);
  const moves = learnset.length
    ? learnset.map(m => ({ key: m[1], pp: MOVES[m[1]].pp }))
    : [{ key: sp.mv[0][1], pp: MOVES[sp.mv[0][1]].pp }];
  const c = {
    id: `c_${Date.now()}_${Math.floor(Math.random()*100000)}`,
    species: speciesKey, lvl: level, xp: xpForLevel(level),
    ivs, moves, status: null, statusTurnsLeft: 0,
    statMods: { atk: 0, def: 0, spd: 0 },
    nickname: null, caughtAt: Date.now()
  };
  c.maxHp = calcStat('hp', sp.s[0], c.ivs.hp, c.lvl);
  c.hp = c.maxHp;
  return c;
}

function ensureCreatureSchema(c) {
  if (!c || !SPECIES[c.species]) return;
  const sp = SPECIES[c.species];
  if (!c.id) c.id = `c_${Date.now()}_${Math.floor(Math.random()*100000)}`;
  if (!c.ivs) c.ivs = { hp: 15, atk: 15, def: 15, spd: 15 };
  if (!c.moves || !c.moves.length) {
    c.moves = sp.mv.filter(m => m[0] <= c.lvl).slice(-4).map(m => ({ key: m[1], pp: MOVES[m[1]].pp }));
    if (!c.moves.length) c.moves = [{ key: sp.mv[0][1], pp: MOVES[sp.mv[0][1]].pp }];
  }
  if (typeof c.xp !== 'number') c.xp = xpForLevel(c.lvl);
  if (!c.statMods) c.statMods = { atk: 0, def: 0, spd: 0 };
  if (typeof c.statusTurnsLeft !== 'number') c.statusTurnsLeft = 0;
  c.maxHp = calcStat('hp', sp.s[0], c.ivs.hp, c.lvl);
  if (typeof c.hp !== 'number' || isNaN(c.hp) || c.hp > c.maxHp || c.hp < 0) c.hp = c.maxHp;
}

// ============================================================
// DAY/NIGHT CYCLE
// ============================================================
function getCyclePhase() {
  const t = (Date.now() % DAY_NIGHT_CYCLE_MS) / DAY_NIGHT_CYCLE_MS;
  const isDay = t < DAY_PORTION;
  const progress = isDay ? (t / DAY_PORTION) : ((t - DAY_PORTION) / (1 - DAY_PORTION));
  // Dawn/dusk transitions
  const transition = isDay ? (progress < 0.12 ? 0.12 - progress : (progress > 0.88 ? progress - 0.88 : 0)) : 0;
  const darkness = isDay ? (transition * 3.5) : (1 - Math.abs(progress - 0.5) * 0.4);
  return { isDay, progress, darkness: clamp(darkness, 0, 1) };
}

let _modalCtx = null;
function openModal({ title, bodyHTML, buttons, wide = false, onClose = null, onBody = null, forceOpen = false }) {
  const bg = document.getElementById('modal-bg');
  document.getElementById('modal').classList.toggle('wide', wide);
  document.getElementById('modal-title').textContent = title || '';
  document.getElementById('modal-body').innerHTML = bodyHTML || '';
  const xBtn = document.getElementById('modal-close');
  if (xBtn) {
    xBtn.style.display = forceOpen ? 'none' : '';
    xBtn.style.visibility = forceOpen ? 'hidden' : 'visible';
  }
  const btns = document.getElementById('modal-btns');
  btns.innerHTML = '';
  _modalCtx = { onClose, forceOpen };
  (buttons || [{ label:'Close', fn: closeModal, primary: true }]).forEach(b => {
    if (!b) return;
    const el = document.createElement('button');
    el.className = 'btn' + (b.primary?' primary':'') + (b.danger?' danger':'');
    el.textContent = b.label || b.text || 'OK';
    if (b.disabled) el.disabled = true;
    const handler = b.fn || b.onclick;
    el.addEventListener('click', () => { handler && handler(); });
    btns.appendChild(el);
  });
  bg.classList.add('open');
  if (onBody) onBody(document.getElementById('modal-body'));
}
function closeModal() {
  if (_modalCtx && _modalCtx.forceOpen) return;
  const bg = document.getElementById('modal-bg');
  bg.classList.remove('open');
  if (_modalCtx && _modalCtx.onClose) _modalCtx.onClose();
  _modalCtx = null;
}
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-bg').addEventListener('click', (e) => {
  if (_modalCtx && _modalCtx.forceOpen) return;
  if (e.target === document.getElementById('modal-bg')) closeModal();
});

async function attemptEnter() {
  const nick = (nickInput.value || '').trim();
  if (!/^[a-zA-Z0-9_]{2,16}$/.test(nick)) {
    loginStatus.textContent = 'use 2-16 letters, numbers, _ only';
    loginStatus.className = 'status err'; return;
  }
  if (!db) { loginStatus.textContent = 'DB not configured'; loginStatus.className = 'status err'; return; }
  enterBtn.disabled = true;
  loginStatus.textContent = 'connecting…';
  loginStatus.className = 'status';
  try {
    const onlineSnap = await get(ref(db, 'online'));
    const onlineData = onlineSnap.val() || {};
    const onlineNicks = Object.keys(onlineData);
    if (!onlineNicks.includes(nick) && onlineNicks.length >= MAX_PLAYERS) {
      loginStatus.textContent = `world full (${MAX_PLAYERS}/${MAX_PLAYERS})`;
      loginStatus.className = 'status err'; enterBtn.disabled = false; return;
    }
    const seedRef = ref(db, 'world/seed');
    const seedSnap = await get(seedRef);
    if (!seedSnap.exists()) { worldSeed = Math.floor(Math.random() * 1_000_000); await set(seedRef, worldSeed); }
    else worldSeed = seedSnap.val();
    world = generateWorld(worldSeed);
    wildlifePlan = generateWildlifePlan(world, worldSeed, 1100);
    VILLAGES = generateVillages(world, worldSeed);

    const playerRef = ref(db, `players/${nick}`);
    const playerSnap = await get(playerRef);
    let freshSpawn = false;
    if (playerSnap.exists()) {
      me = playerSnap.val();
      if (!me.version || me.version < WIPE_DATA_VERSION) {
        addLog('Major update detected — resetting your save.', 'system');
        freshSpawn = true;
        me = null;
      }
    }
    if (!me) freshSpawn = true;

    if (freshSpawn) {
      const newBase = await createNewBase();
      await set(ref(db, `bases/${nick}`), newBase);
      myBase = newBase;
      me = {
        version: SCHEMA_VERSION, nickname: nick,
        x: newBase.x, y: newBase.y + 1,
        hp: 100, maxHp: 100, lvl: 1, xp: 0, gold: 50,
        inventory: { wood: 10, stone: 5, food: 8, herb: 2, seed_berry: 3 },
        tools: { tame_net: 2 },
        party: [], creatureStorage: {}, seen: {},
        battleWins: 0, battleLosses: 0, raidWins: 0, raidDefends: 0,
        glyph: '🧍', appearance: null, quests: {},
        needsCustomization: true,
        lastSeen: Date.now(),
        eggs: {},
        hasBase: true,
        createdAt: Date.now()
      };
      if (!BIOMES[world[me.y]?.[me.x]?.biome]?.walkable) me.y = newBase.y;
      consolidateInventory(me);
      await set(playerRef, me);
    } else {
      // migrate / ensure fields
      me.party = me.party || [];
      me.creatureStorage = me.creatureStorage || {};
      me.seen = me.seen || {};
      me.quests = me.quests || {};
      me.eggs = me.eggs || {};
      // If they have a saved base, flag hasBase so the UI works
      if (myBase && typeof me.hasBase === 'undefined') me.hasBase = true;
      // Sanitize player core stats
      if (typeof me.lvl !== 'number' || isNaN(me.lvl)) me.lvl = 1;
      if (typeof me.maxHp !== 'number' || isNaN(me.maxHp) || me.maxHp <= 0) me.maxHp = 80 + me.lvl * 12;
      if (typeof me.hp !== 'number' || isNaN(me.hp) || me.hp < 0 || me.hp > me.maxHp) me.hp = me.maxHp;
      if (typeof me.xp !== 'number' || isNaN(me.xp)) me.xp = 0;
      if (typeof me.gold !== 'number' || isNaN(me.gold)) me.gold = 0;
      me.party.forEach(ensureCreatureSchema);
      Object.values(me.creatureStorage).forEach(ensureCreatureSchema);
    }

    // CONSOLIDATED INVENTORY — single source of truth (must run on both fresh + migrated)
    consolidateInventory(me);

    // Fetch / migrate base
    const baseRef = ref(db, `bases/${nick}`);
    const baseSnap = await get(baseRef);
    if (baseSnap.exists()) myBase = baseSnap.val();
    else { myBase = await createNewBase(); await set(baseRef, myBase); }
    myBase.equipment = myBase.equipment || { bed:true, workbench:true };
    myBase.structures = myBase.structures || {};
    myBase.farms = myBase.farms || {};
    myBase.assignedTrainers = myBase.assignedTrainers || {};
    myBase.assignedGuardians = myBase.assignedGuardians || {};
    myBase.raidLog = myBase.raidLog || [];
    myBase.lastVisit = myBase.lastVisit || Date.now();
    myBase.pvpDefenseWins = myBase.pvpDefenseWins || 0;

    // Offline progression calc
    const timeAway = Math.min(Date.now() - (me.lastSeen || Date.now()), MAX_OFFLINE_HOURS * 3600_000);
    if (timeAway > 60_000 && !freshSpawn) {
      processOfflineProgression(timeAway);
    }
    me.lastSeen = Date.now();
    myBase.lastVisit = Date.now();

    // Online presence
    await set(ref(db, `online/${nick}`), { joined: Date.now(), x: me.x, y: me.y, glyph: me.glyph || '🧍', lvl: me.lvl });
    onDisconnect(ref(db, `online/${nick}`)).remove();
    onDisconnect(ref(db, `players/${nick}/lastSeen`)).set(Date.now());

    nickname = nick;
    localStorage.setItem('feral_nick', nick);
    subscribeWorld();
    startGame();
  } catch (err) {
    console.error(err);
    loginStatus.textContent = 'connection failed: ' + err.message;
    loginStatus.className = 'status err';
    enterBtn.disabled = false;
  }
}

async function createNewBase() {
  let tries = 0, base = null;
  while (tries++ < 500 && !base) {
    const x = 10 + Math.floor(Math.random() * (WORLD_SIZE - 20));
    const y = 10 + Math.floor(Math.random() * (WORLD_SIZE - 20));
    const tile = world[y][x];
    if (tile.biome === 'water' || tile.biome === 'cave' || tile.resource) continue;
    let ok = true;
    for (let dy = -2; dy <= 2 && ok; dy++) for (let dx = -2; dx <= 2 && ok; dx++) {
      const t = world[y+dy]?.[x+dx];
      if (!t || !BIOMES[t.biome].walkable) ok = false;
    }
    if (ok) base = { x, y };
  }
  if (!base) base = { x: 180, y: 180 };
  return {
    x: base.x, y: base.y, level: 1,
    equipment: { bed: true, workbench: true },
    structures: {}, farms: {},
    assignedTrainers: {}, assignedGuardians: {},
    raidLog: [], lastVisit: Date.now(),
    pvpDefenseWins: 0
  };
}

// ============================================================
// OFFLINE PROGRESSION
// ============================================================
function processOfflineProgression(timeAway) {
  const events = [];
  // 1. Hatch eggs
  let hatched = 0;
  for (const [eggId, egg] of Object.entries(me.eggs || {})) {
    if (Date.now() >= egg.hatchAt) {
      const child = makeCreatureInstance(egg.species, 1, egg.ivs);
      if (me.party.length < PARTY_SIZE) me.party.push(child);
      else me.creatureStorage[child.id] = child;
      me.seen[egg.species] = { seen:true, caught:true };
      delete me.eggs[eggId];
      hatched++;
    }
  }
  if (hatched) events.push(`🥚 ${hatched} egg(s) hatched while you were away.`);

  // 2. Crops ready
  let cropsReady = 0;
  for (const [pid, plot] of Object.entries(myBase.farms || {})) {
    if (!plot.crop || !plot.plantedAt) continue;
    const cropDef = CROPS[plot.crop];
    if (!cropDef) continue;
    if (Date.now() - plot.plantedAt >= cropDef.grow) cropsReady++;
  }
  if (cropsReady) events.push(`🌾 ${cropsReady} crop plot(s) ready to harvest.`);

  // 3. Training XP
  let trainedCount = 0;
  for (const [postId, critterId] of Object.entries(myBase.assignedTrainers || {})) {
    const c = findCreatureById(critterId);
    if (!c) continue;
    const minutes = Math.floor(timeAway / 60_000);
    if (minutes > 0) {
      const xp = minutes * TRAIN_XP_PER_MIN;
      creatureGainXp(c, xp);
      trainedCount++;
    }
  }
  if (trainedCount) events.push(`🎯 ${trainedCount} creature(s) trained while you were gone.`);

  // 4. Offline raids
  const raidRolls = Math.floor(timeAway / RAID_CHECK_INTERVAL_MS);
  for (let i = 0; i < raidRolls; i++) simulateOfflineRaid();

  if (events.length) {
    showEventBanner(events.join(' '), [{ label: 'OK', primary: true, fn: () => hideEventBanner() }]);
  }
}

function findCreatureById(id) {
  return me.party.find(c => c.id === id) || me.creatureStorage[id] || null;
}

function creatureGainXp(c, xp) {
  c.xp += xp;
  const sp = SPECIES[c.species];
  while (c.lvl < 100 && c.xp >= xpForLevel(c.lvl + 1)) {
    c.lvl++;
    c.maxHp = calcStat('hp', sp.s[0], c.ivs.hp, c.lvl);
    c.hp = Math.min(c.maxHp, c.hp + 5);
    // Learn move
    const newMove = sp.mv.find(m => m[0] === c.lvl);
    if (newMove) {
      if (c.moves.length < 4) c.moves.push({ key: newMove[1], pp: MOVES[newMove[1]].pp });
      else { c.moves[Math.floor(Math.random()*4)] = { key: newMove[1], pp: MOVES[newMove[1]].pp }; }
    }
    // Evolve
    if (sp.evo && c.lvl >= sp.evo.lv && SPECIES[sp.evo.to]) {
      c.species = sp.evo.to;
      c.maxHp = calcStat('hp', SPECIES[c.species].s[0], c.ivs.hp, c.lvl);
      me.seen[c.species] = { seen:true, caught:true };
    }
  }
}

// ============================================================
// OFFLINE RAID SIMULATION
// ============================================================
function simulateOfflineRaid() {
  // Compute raid power based on player level
  const raidPower = (me.lvl * 10) + randInt(20, 80);
  // Compute defense power
  const defPower = calcBaseDefensePower();
  const raidCreature = pickRaidCreatureName(me.lvl);
  let result;
  if (defPower >= raidPower) {
    result = 'defended';
    myBase.pvpDefenseWins = (myBase.pvpDefenseWins || 0) + 1;
    // Damage some structures slightly
    damageRandomDefenses(Math.floor(raidPower * 0.3));
    // Small reward for defenders
    me.gold += 10;
  } else {
    result = 'breached';
    damageRandomDefenses(Math.floor(raidPower * 0.8));
    // Steal resources
    const stolen = {};
    for (const k of ['wood','stone','copper','iron','food','gold']) {
      const have = invHave(k);
      if (have > 0) {
        const amt = Math.min(have, Math.floor(have * 0.15));
        if (amt > 0) {
          invRemove(k, amt);
          stolen[k] = amt;
        }
      }
    }
    myBase.lastRaidStolen = stolen;
  }
  const entry = {
    ts: Date.now(), type: 'offline', result,
    enemy: raidCreature, raidPower, defPower
  };
  myBase.raidLog.unshift(entry);
  if (myBase.raidLog.length > 30) myBase.raidLog = myBase.raidLog.slice(0, 30);
}

function pickRaidCreatureName(playerLvl) {
  const pool = Object.entries(SPECIES).filter(([k, sp]) =>
    !k.startsWith('_') && Math.abs(
      ({ common:5, uncommon:15, rare:25, epic:35, legendary:45, mythic:55 }[sp.r]) - playerLvl
    ) < 15
  );
  if (!pool.length) return 'Raider';
  const [, sp] = pool[Math.floor(Math.random() * pool.length)];
  return sp.n;
}

function calcBaseDefensePower() {
  let power = 0;
  for (const st of Object.values(myBase.structures || {})) {
    const def = STRUCTURES[st.type];
    if (!def) continue;
    power += Math.floor((def.hp / 10) + (def.atk || 0) * 1.5);
  }
  for (const [, cid] of Object.entries(myBase.assignedGuardians || {})) {
    const c = findCreatureById(cid);
    if (c) power += c.lvl * 3 + Math.floor(calcStat('atk', SPECIES[c.species].s[1], c.ivs.atk, c.lvl) / 2);
  }
  return power;
}

function damageRandomDefenses(totalDmg) {
  const keys = Object.keys(myBase.structures || {});
  if (!keys.length) return;
  while (totalDmg > 0 && keys.length) {
    const k = keys[Math.floor(Math.random() * keys.length)];
    const st = myBase.structures[k];
    if (!st) break;
    const dmg = Math.min(st.hp, Math.floor(totalDmg / Math.max(1, keys.length)));
    st.hp -= dmg;
    totalDmg -= dmg;
    if (st.hp <= 0) {
      delete myBase.structures[k];
      const idx = keys.indexOf(k); if (idx !== -1) keys.splice(idx, 1);
    } else break;
  }
}

function showEventBanner(msg, buttons) {
  const el = document.getElementById('event-banner');
  document.getElementById('evt-msg').textContent = msg;
  const btns = document.getElementById('evt-btns'); btns.innerHTML = '';
  for (const b of buttons) {
    const bn = document.createElement('button');
    bn.className = 'btn' + (b.primary ? ' primary' : '');
    bn.textContent = b.label;
    bn.addEventListener('click', b.fn);
    btns.appendChild(bn);
  }
  el.classList.add('show');
}
function hideEventBanner() { document.getElementById('event-banner').classList.remove('show'); }

function subscribeWorld() {
  onValue(ref(db, 'online'), (snap) => {
    const data = snap.val() || {};
    delete data[nickname];
    players = data;
    onlineCount = 1 + Object.keys(data).length;
    renderStatsPanel();
  });
  onValue(ref(db, 'wildlifeDefeats'), (snap) => {
    const data = snap.val() || {};
    const now = Date.now();
    wildlifeDefeats = {};
    for (const [k, v] of Object.entries(data)) {
      if (v && (now - v) < CREATURE_RESPAWN_MS) wildlifeDefeats[k] = v;
    }
  });
  onValue(ref(db, 'depleted'), (snap) => {
    const data = snap.val() || {};
    const now = Date.now();
    depletedResources = {};
    for (const [k, v] of Object.entries(data)) {
      if (v && (now - v) < RESOURCE_RESPAWN_MS) depletedResources[k] = v;
    }
  });
  onValue(ref(db, `challenges/${nickname}`), (snap) => {
    const data = snap.val();
    if (data && data.from && data.kind) {
      incomingChallenge = data;
      showChallengeBanner(data);
    } else {
      incomingChallenge = null;
      hideChallengeBanner();
    }
  });
}

function savePlayer() {
  if (!db || !nickname || !me) return;
  me.exploredCSV = [...exploredTiles].slice(-8000).join(',');
  // Defensive: never persist NaN to Firebase, it bricks saves
  sanitizePlayerForSave(me);
  const payload = JSON.parse(JSON.stringify(me));
  // Strip legacy duplicate buckets in case anything wrote to them
  delete payload.inventory;
  delete payload.tools;
  update(ref(db, `players/${nickname}`), payload);
}
function sanitizePlayerForSave(p) {
  if (typeof p.hp !== 'number' || isNaN(p.hp)) p.hp = p.maxHp || 100;
  if (typeof p.maxHp !== 'number' || isNaN(p.maxHp) || p.maxHp <= 0) p.maxHp = 100;
  if (p.hp < 0) p.hp = 0;
  if (p.hp > p.maxHp) p.hp = p.maxHp;
  if (typeof p.lvl !== 'number' || isNaN(p.lvl)) p.lvl = 1;
  if (typeof p.xp !== 'number' || isNaN(p.xp)) p.xp = 0;
  if (typeof p.gold !== 'number' || isNaN(p.gold)) p.gold = 0;
  if (typeof p.x !== 'number' || isNaN(p.x)) p.x = 180;
  if (typeof p.y !== 'number' || isNaN(p.y)) p.y = 180;
  // Sanitize creatures
  if (Array.isArray(p.party)) p.party.forEach(sanitizeCreatureForSave);
  if (p.creatureStorage) Object.values(p.creatureStorage).forEach(sanitizeCreatureForSave);
}
function sanitizeCreatureForSave(c) {
  if (!c) return;
  if (typeof c.lvl !== 'number' || isNaN(c.lvl) || c.lvl < 1) c.lvl = 1;
  if (typeof c.xp !== 'number' || isNaN(c.xp)) c.xp = 0;
  if (typeof c.maxHp !== 'number' || isNaN(c.maxHp) || c.maxHp <= 0) c.maxHp = 20;
  if (typeof c.hp !== 'number' || isNaN(c.hp) || c.hp < 0 || c.hp > c.maxHp) c.hp = c.maxHp;
  if (!c.ivs || typeof c.ivs !== 'object') c.ivs = { hp:15, atk:15, def:15, spd:15 };
  for (const k of ['hp','atk','def','spd']) {
    if (typeof c.ivs[k] !== 'number' || isNaN(c.ivs[k])) c.ivs[k] = 15;
  }
}
function saveBase() {
  if (!db || !nickname || !myBase) return;
  update(ref(db, `bases/${nickname}`), JSON.parse(JSON.stringify(myBase)));
}
function savePosOnly() {
  if (!db || !nickname || !me) return;
  update(ref(db, `online/${nickname}`), { x: me.x, y: me.y, joined: Date.now(), glyph: me.glyph || '🧍', lvl: me.lvl });
  update(ref(db, `players/${nickname}`), { x: me.x, y: me.y, lastSeen: Date.now() });
}

// NORMALIZATION — bridge naming conventions + enrich ITEMS
// ============================================================
(function normalizeConstants() {
  const itemMeta = {
    wood:{cat:'mat'}, stone:{cat:'mat'}, copper:{cat:'mat'}, iron:{cat:'mat'},
    goldbar:{cat:'mat'}, crystal:{cat:'mat'}, food:{cat:'food'}, herb:{cat:'mat'},
    shell:{cat:'mat'}, ice:{cat:'mat'}, gold:{cat:'misc'},
    seed_berry:{cat:'seed'}, seed_wheat:{cat:'seed'}, seed_herb:{cat:'seed'}, seed_arcane:{cat:'seed'},
    potion:{cat:'potion', heal:40, desc:'Heals 40 HP.'},
    elixir:{cat:'potion', heal:999, cureStatus:true, desc:'Full heal + cure status.'},
    tincture:{cat:'potion', cureStatus:true, desc:'Cures status effects.'},
    rare_candy:{cat:'misc', desc:'Gives creature +1 level when used on it.'},
    power_charm:{cat:'trinket', desc:'+10% Atk when held.'},
    guard_charm:{cat:'trinket', desc:'+10% Def when held.'},
    swift_charm:{cat:'trinket', desc:'+10% Spd when held.'},
    vital_charm:{cat:'trinket', desc:'+10% HP when held.'},
    hide_armor:{cat:'tool', slot:'armor', hpBonus:20, desc:'Basic armor.'},
    iron_armor:{cat:'tool', slot:'armor', hpBonus:60, desc:'Sturdy armor.'},
    crystal_armor:{cat:'tool', slot:'armor', hpBonus:120, desc:'Best armor.'},
    tame_net:{cat:'tool', slot:'net', desc:'Capture wild creatures.'},
    master_net:{cat:'tool', slot:'net', desc:'Better capture rate.'},
  };
  for (const [k, it] of Object.entries(ITEMS)) {
    it.n = it.name; it.emoji = it.icon;
    const m = itemMeta[k];
    if (m) Object.assign(it, m);
    if (!it.cat) {
      if (it.tool) {
        it.cat = 'tool';
        if (it.toolType === 'pick') it.slot = 'pickaxe';
        else if (it.toolType === 'axe') it.slot = 'axe';
        else if (it.toolType === 'weapon') it.slot = 'sword';
      } else it.cat = 'misc';
    }
    if (!it.desc) it.desc = '';
  }
  for (const [k, s] of Object.entries(STRUCTURES)) {
    s.emoji = s.icon;
    s.minBaseLevel = s.kind === 'tower' ? 2 : 1;
  }
  for (const [k, c] of Object.entries(CROPS)) {
    c.name = k.charAt(0).toUpperCase() + k.slice(1);
    c.growMin = Math.round(c.grow / 60_000);
    c.yields = c.yield;
  }
  for (const [k, sp] of Object.entries(SPECIES)) {
    if (!sp.e) sp.e = sp.g || sp.emoji || '❓';
    if (!sp.n && sp.name) sp.n = sp.name;
    if (!sp.b && sp.s) sp.b = { hp:sp.s[0], atk:sp.s[1], def:sp.s[2], spd:sp.s[3] };
    // Normalize sp.t to always be an array (sp.tStr retains string form for existing battle UI)
    sp.tStr = typeof sp.t === 'string' ? sp.t : (Array.isArray(sp.t) ? sp.t[0] : 'normal');
    sp.tArr = Array.isArray(sp.t) ? sp.t : [sp.tStr];
  }
  for (const [k, m] of Object.entries(MOVES)) {
    if (!m.n && m.name) m.n = m.name;
    if (!m.p && m.power !== undefined) m.p = m.power;
    if (!m.t && m.type) m.t = m.type;
  }
})();

function startGame() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('game').classList.add('active');

  if (me.exploredCSV) {
    for (const t of me.exploredCSV.split(',')) if (t) exploredTiles.add(t);
  }
  for (let dy = -8; dy <= 8; dy++) for (let dx = -8; dx <= 8; dx++) {
    const x = me.x + dx, y = me.y + dy;
    if (x >= 0 && y >= 0 && x < WORLD_SIZE && y < WORLD_SIZE) exploredTiles.add(`${x}_${y}`);
  }

  sizeCanvas();
  window.addEventListener('resize', sizeCanvas);

  setupTabs();
  setupInput();
  setupDpad();

  if (me.needsCustomization) setTimeout(() => openCharacterCustomization(), 300);

  renderAll();
  requestAnimationFrame(tickLoop);
  setInterval(() => { savePlayer(); saveBase(); }, 15000);
  setInterval(savePosOnly, 6000);

  subscribeChallenges();

  if (myBase && myBase.raidLog && myBase.raidLog.length) {
    const recent = myBase.raidLog.filter(r => Date.now() - (r.at || r.ts || 0) < 3600_000 * 24);
    if (recent.length) {
      setTimeout(() => {
        addLog(`${recent.length} raid(s) occurred while offline. Check Raid tab.`, 'raid');
      }, 1500);
    }
  }

  addLog('Connected to FERAL world.', 'system');
  if (typeof onlineCount !== 'undefined') addLog(`${onlineCount} player(s) online.`, 'info');
}

function sizeCanvas() {
  const wrap = document.getElementById('world-wrap');
  const w = wrap.clientWidth, h = wrap.clientHeight;
  const tile = Math.floor(Math.min(w, h) / VIEW_TILES);
  const pxW = tile * VIEW_TILES;
  const pxH = tile * VIEW_TILES;
  canvas.width = pxW; canvas.height = pxH;
  canvas.style.width = pxW + 'px'; canvas.style.height = pxH + 'px';
  canvas.style.left = Math.max(0, (w - pxW) / 2) + 'px';
  canvas.style.top = Math.max(0, (h - pxH) / 2) + 'px';
}

function setupTabs() {
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      const tab = t.getAttribute('data-tab');
      document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
      document.getElementById(`tab-${tab}`).style.display = 'block';
      if (tab === 'stats') renderStatsPanel();
      else if (tab === 'inv') renderInventoryPanel();
      else if (tab === 'party') renderPartyPanel();
      else if (tab === 'crit') renderDexPanel();
      else if (tab === 'craft') renderCraftPanel();
      else if (tab === 'base') renderBasePanel();
      else if (tab === 'raid') renderRaidPanel();
    });
  });
}

const keys = {};
function setupInput() {
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (document.getElementById('modal-bg').classList.contains('open')) {
      if (e.key === 'Escape' && !(_modalCtx && _modalCtx.forceOpen)) closeModal();
      return;
    }
    keys[e.key.toLowerCase()] = true;
    if (['w','a','s','d','arrowup','arrowdown','arrowleft','arrowright',' ','e','i'].includes(e.key.toLowerCase())) e.preventDefault();
    if (e.key === ' ' || e.key.toLowerCase() === 'e') tryInteract();
    if (e.key.toLowerCase() === 'i') { openInventory && openInventory(); }
  });
  document.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });
  canvas.addEventListener('click', onCanvasClick);
}
function setupDpad() {
  document.querySelectorAll('.dpad-btn[data-dir]').forEach(b => {
    const dir = b.getAttribute('data-dir');
    const handler = (e) => { e.preventDefault();
      if (dir === 'act') tryInteract();
      else tryMove(dir);
    };
    b.addEventListener('touchstart', handler, { passive: false });
    b.addEventListener('mousedown', handler);
  });
}

function tryMove(dir) {
  if (activeBattle) return;
  const now = Date.now();
  if (now - lastMoveTs < 100) return;
  let dx = 0, dy = 0;
  if (dir === 'up') dy = -1; else if (dir === 'down') dy = 1;
  else if (dir === 'left') dx = -1; else if (dir === 'right') dx = 1;
  if (interior) moveBaseInteriorBy(dx, dy); else moveBy(dx, dy);
  lastMoveTs = now;
}

function onCanvasClick(e) {
  if (activeBattle) return;
  const rect = canvas.getBoundingClientRect();
  const tile = canvas.width / VIEW_TILES;
  const cx = Math.floor((e.clientX - rect.left) / tile);
  const cy = Math.floor((e.clientY - rect.top) / tile);
  const dx = cx - Math.floor(VIEW_TILES / 2);
  const dy = cy - Math.floor(VIEW_TILES / 2);
  if (Math.abs(dx) + Math.abs(dy) === 1) { if (interior) moveBaseInteriorBy(dx, dy); else moveBy(dx, dy); }
  else if (Math.abs(dx) + Math.abs(dy) === 0) tryInteract();
}

function moveBy(dx, dy) {
  if (!dx && !dy) return;
  const nx = me.x + dx, ny = me.y + dy;
  if (nx < 0 || ny < 0 || nx >= WORLD_SIZE || ny >= WORLD_SIZE) return;
  const tile = world[ny][nx];
  if (!BIOMES[tile.biome].walkable) return;
  for (const p of Object.values(players)) if (p.x === nx && p.y === ny) return;
  for (const v of VILLAGES) for (const n of v.npcs) if (n.x === nx && n.y === ny) return;
  if (nx === myBase.x && ny === myBase.y) { enterBase(); return; }

  me.x = nx; me.y = ny;
  for (let ey = -6; ey <= 6; ey++) for (let ex = -6; ex <= 6; ex++) {
    const dist = Math.abs(ex) + Math.abs(ey);
    if (dist > 7) continue;
    const xx = nx + ex, yy = ny + ey;
    if (xx >= 0 && yy >= 0 && xx < WORLD_SIZE && yy < WORLD_SIZE) exploredTiles.add(`${xx}_${yy}`);
  }
  maybeWildEncounter();
  updateHUD();
  renderWorld();
  renderMinimap();
}

function maybeWildEncounter() {
  for (const [id, w] of Object.entries(wildlifePlan)) {
    if (wildlifeDefeats[id] && Date.now() - wildlifeDefeats[id] < CREATURE_RESPAWN_MS) continue;
    const d = Math.abs(w.x - me.x) + Math.abs(w.y - me.y);
    if (d === 0 && Math.random() < 0.85) {
      startWildBattle(id, w);
      return;
    }
  }
  const tile = world[me.y][me.x];
  if (BIOMES[tile.biome].walkable && !tile.resource && Math.random() < 0.016) {
    const phase = getCyclePhase();
    const key = pickSpeciesForBiome(tile.biome, Math.random, !phase.isDay);
    if (key) {
      const sp = SPECIES[key];
      const rarityFloor = { common:1, uncommon:5, rare:12, epic:22, legendary:32, mythic:42 }[sp.r] || 1;
      const lv = rarityFloor + randInt(0, 6);
      startWildBattle(null, { x: me.x, y: me.y, species: key, level: lv });
    }
  }
}

function tryInteract() {
  if (activeBattle) return;
  if (interior) { tryInteractInterior(); return; }
  // If no base, allow planting one on an empty walkable tile at player's feet
  if (!me.hasBase) {
    const tile = world[me.y]?.[me.x];
    if (tile && BIOMES[tile.biome]?.walkable && !tile.resource) {
      plantBaseHere();
      return;
    } else {
      addLog('Find empty walkable ground (not on water, stone, tree, or resource).', 'warn');
      return;
    }
  }
  const tries = [[0,0],[1,0],[-1,0],[0,1],[0,-1]];
  for (const [dx, dy] of tries) {
    const tx = me.x + dx, ty = me.y + dy;
    if (tx < 0 || ty < 0 || tx >= WORLD_SIZE || ty >= WORLD_SIZE) continue;
    const t = world[ty][tx];
    if (t.resource) {
      const depId = `${tx}_${ty}`;
      if (depletedResources[depId] && Date.now() - depletedResources[depId] < RESOURCE_RESPAWN_MS) continue;
      harvestResource(tx, ty, t);
      return;
    }
    if (myBase && tx === myBase.x && ty === myBase.y) { enterBase(); return; }
    for (const v of VILLAGES) for (const n of v.npcs) if (n.x === tx && n.y === ty) { openNpcDialogue(n, v); return; }
    for (const [pn, p] of Object.entries(players)) if (p.x === tx && p.y === ty) { openPlayerInteract(pn, p); return; }
  }
}

async function plantBaseHere() {
  // Create base object at current position
  const newBase = {
    x: me.x, y: me.y, level: 1,
    equipment: { bed: true, workbench: true },
    structures: {}, farms: {},
    assignedTrainers: {}, assignedGuardians: {},
    raidLog: [], lastVisit: Date.now(),
    pvpDefenseWins: 0
  };
  await set(ref(db, `bases/${me.nickname}`), newBase);
  myBase = newBase;
  me.hasBase = true;
  savePlayer();
  addLog(`Base planted at ${me.x},${me.y}! Press E again to enter.`, 'good');
  renderAll();
  renderBasePanel();
}

function harvestResource(x, y, tile) {
  const res = RESOURCES[tile.resource];
  if (!res) return;
  if (res.toolType) {
    const playerTier = computePlayerToolTier(res.toolType);
    if (res.tierReq > playerTier) {
      addLog(`You need a better ${res.toolType} to harvest ${res.name}.`, 'bad');
      return;
    }
  }
  let amount = 1 + Math.floor(Math.random() * 2);
  if (res.toolType) {
    const tool = findBestTool(res.toolType);
    if (tool && tool.bonus?.resource === res.drops) amount += tool.bonus.amt;
  }
  invAdd(res.drops, amount);
  addLog(`+${amount} ${ITEMS[res.drops].name}`, 'good');
  flashDamageText(canvas.width/2, canvas.height/2, `+${amount} ${res.drops}`, 'gold');
  const depId = `${x}_${y}`;
  set(ref(db, `depleted/${depId}`), Date.now());
  depletedResources[depId] = Date.now();
  savePlayer();
  renderInventoryPanel();
}

function computePlayerToolTier(type) {
  let best = 0;
  const inv = me.inv || {};
  for (const [k, amt] of Object.entries(inv)) {
    if (!amt || amt <= 0) continue;
    const it = ITEMS[k];
    if (!it || !it.tool) continue;
    if (it.toolType === type && it.tier > best) best = it.tier;
  }
  return best;
}
function findBestTool(type) {
  let best = null;
  const inv = me.inv || {};
  for (const [k, amt] of Object.entries(inv)) {
    if (!amt || amt <= 0) continue;
    const it = ITEMS[k];
    if (!it || !it.tool) continue;
    if (it.toolType === type && (!best || it.tier > best.tier)) best = it;
  }
  return best;
}
