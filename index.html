function renderAll() {
  sizeCanvas();
  if (interior) renderInterior(); else renderWorld();
  renderMinimap();
  renderStatsPanel();
  renderInventoryPanel();
  updateHUD();
  updateTimeHUD();
  renderDirty = false;
}

function updateHUD() {
  if (!me) return;
  document.getElementById('hud-hp').textContent = `${me.hp}/${me.maxHp}`;
  document.getElementById('hud-gold').textContent = me.gold;
  document.getElementById('hud-pos').textContent = `${me.x},${me.y}`;
  const tile = world[me.y]?.[me.x];
  document.getElementById('hud-biome').textContent = tile ? BIOMES[tile.biome].name : '—';
  document.getElementById('brand-name').textContent = nickname;
  document.getElementById('brand-lvl').textContent = me.lvl;
  document.getElementById('brand-gold').textContent = me.gold;
}

function updateTimeHUD() {
  const phase = getCyclePhase();
  const el = document.getElementById('time-phase');
  el.textContent = phase.isDay ? 'DAY' : 'NIGHT';
  el.className = 'phase' + (phase.isDay ? '' : ' night');
  const total = phase.isDay ? DAY_PORTION : (1 - DAY_PORTION);
  const remaining = Math.floor((1 - phase.progress) * total * DAY_NIGHT_CYCLE_MS / 1000);
  const mm = Math.floor(remaining / 60); const ss = remaining % 60;
  document.getElementById('time-clock').textContent = `${mm}:${String(ss).padStart(2,'0')}`;
}

function drawTile(x, y, tx, ty, ts, explored, phase) {
  const b = BIOMES[world[y][x].biome];
  const baseX = tx * ts, baseY = ty * ts;
  ctx.fillStyle = b.color;
  ctx.fillRect(baseX, baseY, ts, ts);

  const seed = (x * 374761 + y * 668265263) >>> 0;
  const n1 = ((seed >>> 4) & 15) / 15;
  const n2 = ((seed >>> 10) & 15) / 15;
  const n3 = ((seed >>> 16) & 15) / 15;

  const biome = world[y][x].biome;
  if (biome === 'grass') {
    ctx.fillStyle = b.colorLite;
    if (n1 < 0.45) ctx.fillRect(baseX + Math.floor(n1 * ts * 0.8), baseY + Math.floor(n2 * ts * 0.8), 2, 2);
    if (n2 < 0.3) ctx.fillRect(baseX + Math.floor(n3 * ts * 0.7) + 3, baseY + Math.floor(n1 * ts * 0.7) + 3, 2, 2);
    if (n3 > 0.85) { ctx.fillStyle = '#5a7d48'; ctx.fillRect(baseX + Math.floor(n1*ts*0.8), baseY + Math.floor(n2*ts*0.8), 1, 3); }
  } else if (biome === 'forest') {
    ctx.fillStyle = b.colorLite;
    if (n1 < 0.4) ctx.fillRect(baseX + 2, baseY + 2, 3, 3);
    if (n2 > 0.7) { ctx.fillStyle = '#3a5530'; ctx.fillRect(baseX + Math.floor(n3*ts*0.5)+4, baseY+Math.floor(n1*ts*0.7), 2, 2); }
  } else if (biome === 'water') {
    const w1 = Math.sin(animFrame * 0.04 + x * 0.5) * 0.5 + 0.5;
    ctx.fillStyle = `rgba(80, 150, 200, ${0.1 + w1 * 0.25})`;
    ctx.fillRect(baseX, baseY + Math.floor(w1 * ts * 0.3), ts, 1);
    ctx.fillRect(baseX + Math.floor(w1 * ts * 0.5), baseY + Math.floor(ts * 0.7), Math.floor(ts * 0.4), 1);
  } else if (biome === 'mountain') {
    ctx.fillStyle = b.colorLite;
    ctx.fillRect(baseX + Math.floor(n1*ts*0.8), baseY + Math.floor(n2*ts*0.8), 3, 2);
    if (n3 > 0.6) { ctx.fillStyle = '#3a342c'; ctx.fillRect(baseX + Math.floor(n2*ts*0.5)+2, baseY+Math.floor(n1*ts*0.5)+2, 2, 2); }
  } else if (biome === 'sand') {
    ctx.fillStyle = '#8a7550';
    if (n1 < 0.3) ctx.fillRect(baseX + Math.floor(n1*ts*0.9), baseY + Math.floor(n2*ts*0.9), 1, 1);
    if (n2 < 0.3) ctx.fillRect(baseX + Math.floor(n3*ts*0.9), baseY + Math.floor(n1*ts*0.9), 1, 1);
  } else if (biome === 'cave') {
    if (n1 > 0.92) { ctx.fillStyle = '#4a4a5c'; ctx.fillRect(baseX + Math.floor(n2*ts*0.8), baseY + Math.floor(n3*ts*0.8), 2, 2); }
    if (n2 > 0.96) { ctx.fillStyle = '#6a6a8c'; ctx.fillRect(baseX + Math.floor(n3*ts*0.8), baseY + Math.floor(n1*ts*0.8), 1, 1); }
  } else if (biome === 'swamp') {
    ctx.fillStyle = '#3f4a28';
    if (n1 < 0.4) ctx.fillRect(baseX + Math.floor(n1*ts*0.9), baseY + Math.floor(n2*ts*0.9), 2, 1);
    if (n3 > 0.8) { ctx.fillStyle = '#5a6832'; ctx.fillRect(baseX+2, baseY+ts-4, 3, 3); }
  } else if (biome === 'tundra') {
    ctx.fillStyle = '#a4acb4';
    if (n1 < 0.35) ctx.fillRect(baseX + Math.floor(n1*ts*0.9), baseY + Math.floor(n2*ts*0.9), 2, 2);
    if (n2 > 0.88) { ctx.fillStyle = '#dde3e8'; ctx.fillRect(baseX + Math.floor(n3*ts*0.8), baseY + Math.floor(n1*ts*0.8), 1, 1); }
  }

  if (phase.darkness > 0.05) {
    const alpha = phase.darkness * 0.55;
    ctx.fillStyle = `rgba(8, 16, 40, ${alpha})`;
    ctx.fillRect(baseX, baseY, ts, ts);
  }

  if (!explored) {
    ctx.fillStyle = 'rgba(0,0,0,0.72)';
    ctx.fillRect(baseX, baseY, ts, ts);
  }
}

function renderWorld() {
  if (interior) { renderInterior(); return; }
  const ts = Math.floor(canvas.width / VIEW_TILES);
  const half = Math.floor(VIEW_TILES / 2);
  const phase = getCyclePhase();

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let ty = 0; ty < VIEW_TILES; ty++) {
    for (let tx = 0; tx < VIEW_TILES; tx++) {
      const wx = me.x + tx - half;
      const wy = me.y + ty - half;
      if (wx < 0 || wy < 0 || wx >= WORLD_SIZE || wy >= WORLD_SIZE) {
        ctx.fillStyle = '#000'; ctx.fillRect(tx*ts, ty*ts, ts, ts); continue;
      }
      const explored = exploredTiles.has(`${wx}_${wy}`);
      drawTile(wx, wy, tx, ty, ts, explored, phase);
    }
  }

  ctx.font = `${Math.floor(ts * 0.85)}px -apple-system, sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (let ty = 0; ty < VIEW_TILES; ty++) {
    for (let tx = 0; tx < VIEW_TILES; tx++) {
      const wx = me.x + tx - half, wy = me.y + ty - half;
      if (wx < 0 || wy < 0 || wx >= WORLD_SIZE || wy >= WORLD_SIZE) continue;
      if (!exploredTiles.has(`${wx}_${wy}`)) continue;
      const t = world[wy][wx];
      if (t.resource) {
        const depId = `${wx}_${wy}`;
        if (depletedResources[depId] && Date.now() - depletedResources[depId] < RESOURCE_RESPAWN_MS) {
          ctx.globalAlpha = 0.25;
          ctx.fillText(RESOURCES[t.resource].glyph, tx*ts + ts/2, ty*ts + ts/2);
          ctx.globalAlpha = 1;
        } else {
          ctx.fillText(RESOURCES[t.resource].glyph, tx*ts + ts/2, ty*ts + ts/2);
        }
      }
    }
  }

  for (const [id, w] of Object.entries(wildlifePlan)) {
    if (wildlifeDefeats[id] && Date.now() - wildlifeDefeats[id] < CREATURE_RESPAWN_MS) continue;
    const dx = w.x - me.x, dy = w.y - me.y;
    if (Math.abs(dx) > half || Math.abs(dy) > half) continue;
    if (!exploredTiles.has(`${w.x}_${w.y}`)) continue;
    const sp = SPECIES[w.species];
    if (!sp) continue;
    const tx = (dx + half), ty = (dy + half);
    const haloColors = { common:null, uncommon:'rgba(124,189,86,0.25)', rare:'rgba(106,176,196,0.35)', epic:'rgba(168,126,200,0.4)', legendary:'rgba(255,179,71,0.5)', mythic:'rgba(255,107,107,0.55)' };
    if (haloColors[sp.r]) {
      ctx.fillStyle = haloColors[sp.r];
      ctx.beginPath(); ctx.arc(tx*ts + ts/2, ty*ts + ts/2, ts * 0.45, 0, Math.PI * 2); ctx.fill();
    }
    ctx.fillText(sp.g, tx*ts + ts/2, ty*ts + ts/2);
  }

  for (const v of VILLAGES) {
    const vdx = v.x - me.x, vdy = v.y - me.y;
    if (Math.abs(vdx) > half + 4 || Math.abs(vdy) > half + 4) continue;
    if (exploredTiles.has(`${v.x}_${v.y}`) && Math.abs(vdx) <= half && Math.abs(vdy) <= half) {
      ctx.fillText('🏘️', (vdx+half)*ts + ts/2, (vdy+half)*ts + ts/2);
    }
    for (const n of v.npcs) {
      const dx = n.x - me.x, dy = n.y - me.y;
      if (Math.abs(dx) > half || Math.abs(dy) > half) continue;
      if (!exploredTiles.has(`${n.x}_${n.y}`)) continue;
      ctx.fillText(n.glyph, (dx+half)*ts + ts/2, (dy+half)*ts + ts/2);
    }
  }

  const bdx = myBase.x - me.x, bdy = myBase.y - me.y;
  if (Math.abs(bdx) <= half && Math.abs(bdy) <= half) {
    const bx = (bdx + half) * ts, by = (bdy + half) * ts;
    ctx.fillStyle = 'rgba(255, 179, 71, 0.2)';
    ctx.fillRect(bx, by, ts, ts);
    ctx.strokeStyle = '#ffb347';
    ctx.lineWidth = 2;
    ctx.strokeRect(bx + 2, by + 2, ts - 4, ts - 4);
    ctx.fillText('🏠', bx + ts/2, by + ts/2);
  }

  for (const [pn, p] of Object.entries(players)) {
    const dx = p.x - me.x, dy = p.y - me.y;
    if (Math.abs(dx) > half || Math.abs(dy) > half) continue;
    const px = (dx + half) * ts, py = (dy + half) * ts;
    ctx.fillStyle = 'rgba(106,176,196,0.3)';
    ctx.fillRect(px, py, ts, ts);
    ctx.fillText(p.glyph || '🧍', px + ts/2, py + ts/2);
    ctx.fillStyle = '#6ab0c4'; ctx.font = `10px monospace`;
    ctx.fillText(pn, px + ts/2, py + 6);
    ctx.font = `${Math.floor(ts * 0.85)}px -apple-system, sans-serif`;
  }

  const pcx = half * ts + ts/2, pcy = half * ts + ts/2;
  ctx.fillStyle = 'rgba(255,179,71,0.3)';
  ctx.beginPath(); ctx.arc(pcx, pcy, ts * 0.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.fillText(me.glyph || '🧍', pcx, pcy);

  if (phase.darkness > 0.2) {
    const grad = ctx.createRadialGradient(pcx, pcy, ts * 0.5, pcx, pcy, ts * 5);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, `rgba(4, 10, 25, ${phase.darkness * 0.6})`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
}

function renderInterior() {
  const ts = Math.floor(canvas.width / 13);
  const size = BASE_LEVELS[myBase.level].size;
  const gridOffset = Math.floor((13 - size) / 2);
  ctx.fillStyle = '#140a04';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      const tx = (x + gridOffset) * ts, ty = (y + gridOffset) * ts;
      const wood = (x + y) % 2 === 0 ? '#3a2410' : '#2e1c0c';
      ctx.fillStyle = wood;
      ctx.fillRect(tx, ty, ts, ts);
      ctx.strokeStyle = '#1a0c04'; ctx.lineWidth = 1;
      ctx.strokeRect(tx, ty, ts, ts);
    }
  }
  ctx.strokeStyle = '#5a3820'; ctx.lineWidth = 3;
  ctx.strokeRect(gridOffset * ts, gridOffset * ts, size * ts, size * ts);

  ctx.font = `${Math.floor(ts * 0.75)}px -apple-system, sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  const eqList = Object.keys(myBase.equipment || {}).filter(k => CORE_EQUIPMENT[k] && myBase.equipment[k]);
  eqList.forEach((k, i) => {
    const def = CORE_EQUIPMENT[k];
    const col = i % (size - 2);
    const row = Math.floor(i / (size - 2));
    const ex = (gridOffset + 1 + col) * ts, ey = (gridOffset + 1 + row) * ts;
    ctx.fillText(def.icon, ex + ts/2, ey + ts/2);
  });

  for (const [key, st] of Object.entries(myBase.structures || {})) {
    const [sx, sy] = key.split('_').map(Number);
    const def = STRUCTURES[st.type];
    if (!def) continue;
    const tx = (gridOffset + sx) * ts, ty = (gridOffset + sy) * ts;
    ctx.fillText(def.icon, tx + ts/2, ty + ts/2);
    const hpPct = st.hp / def.hp;
    if (hpPct < 1) {
      ctx.fillStyle = '#222'; ctx.fillRect(tx + 2, ty + ts - 4, ts - 4, 3);
      ctx.fillStyle = hpPct > 0.5 ? '#7cbd56' : (hpPct > 0.25 ? '#ffb347' : '#d35454');
      ctx.fillRect(tx + 2, ty + ts - 4, (ts - 4) * hpPct, 3);
    }
  }
  for (const [key, plot] of Object.entries(myBase.farms || {})) {
    const [sx, sy] = key.split('_').map(Number);
    const tx = (gridOffset + sx) * ts, ty = (gridOffset + sy) * ts;
    ctx.fillStyle = '#2a3a1a';
    ctx.fillRect(tx + 2, ty + 2, ts - 4, ts - 4);
    if (plot.crop && plot.plantedAt) {
      const cdef = CROPS[plot.crop];
      const pct = clamp((Date.now() - plot.plantedAt) / cdef.grow, 0, 1);
      if (pct >= 1) ctx.fillText(cdef.icon, tx + ts/2, ty + ts/2);
      else {
        ctx.fillStyle = '#7cbd56'; ctx.font = `${Math.floor(ts*0.4)}px sans-serif`;
        ctx.fillText('🌱', tx + ts/2, ty + ts/2);
        ctx.font = `${Math.floor(ts * 0.75)}px -apple-system, sans-serif`;
      }
    }
  }

  const doorX = gridOffset + Math.floor(size / 2);
  const doorY = gridOffset + size - 1;
  ctx.fillStyle = 'rgba(255,179,71,0.3)';
  ctx.fillRect(doorX * ts, doorY * ts, ts, ts);
  ctx.fillText('🚪', doorX * ts + ts/2, doorY * ts + ts/2);

  const px = (gridOffset + me.interiorX) * ts;
  const py = (gridOffset + me.interiorY) * ts;
  ctx.fillStyle = 'rgba(255,179,71,0.3)';
  ctx.beginPath(); ctx.arc(px + ts/2, py + ts/2, ts * 0.45, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.fillText(me.glyph || '🧍', px + ts/2, py + ts/2);
}

function renderMinimap() {
  const size = mmCanvas.width;
  mmCtx.fillStyle = '#000';
  mmCtx.fillRect(0, 0, size, size);
  const range = 60;
  const pxPerTile = size / (range * 2);
  const startX = Math.max(0, me.x - range);
  const startY = Math.max(0, me.y - range);
  const endX = Math.min(WORLD_SIZE - 1, me.x + range);
  const endY = Math.min(WORLD_SIZE - 1, me.y + range);
  for (let y = startY; y <= endY; y++) {
    for (let x = startX; x <= endX; x++) {
      if (!exploredTiles.has(`${x}_${y}`)) continue;
      const b = world[y][x].biome;
      mmCtx.fillStyle = BIOMES[b].color;
      const px = (x - (me.x - range)) * pxPerTile;
      const py = (y - (me.y - range)) * pxPerTile;
      mmCtx.fillRect(px, py, Math.ceil(pxPerTile), Math.ceil(pxPerTile));
    }
  }
  const bx = (myBase.x - (me.x - range)) * pxPerTile;
  const by = (myBase.y - (me.y - range)) * pxPerTile;
  if (bx >= 0 && by >= 0 && bx < size && by < size) {
    mmCtx.fillStyle = '#ffb347';
    mmCtx.fillRect(bx - 1, by - 1, 4, 4);
  }
  for (const p of Object.values(players)) {
    const px = (p.x - (me.x - range)) * pxPerTile;
    const py = (p.y - (me.y - range)) * pxPerTile;
    if (px >= 0 && py >= 0 && px < size && py < size) {
      mmCtx.fillStyle = '#6ab0c4';
      mmCtx.fillRect(px - 1, py - 1, 3, 3);
    }
  }
  for (const v of VILLAGES) {
    const vx = (v.x - (me.x - range)) * pxPerTile;
    const vy = (v.y - (me.y - range)) * pxPerTile;
    if (vx >= 0 && vy >= 0 && vx < size && vy < size && exploredTiles.has(`${v.x}_${v.y}`)) {
      mmCtx.fillStyle = '#a87ec8';
      mmCtx.fillRect(vx - 1, vy - 1, 3, 3);
    }
  }
  mmCtx.fillStyle = '#fff';
  mmCtx.fillRect(size/2 - 2, size/2 - 2, 4, 4);
  mmCtx.strokeStyle = '#3d5447'; mmCtx.lineWidth = 1;
  mmCtx.strokeRect(0, 0, size, size);
}

function flashDamageText(x, y, text, color = 'red') {
  const wrap = document.getElementById('world-wrap');
  const el = document.createElement('div');
  el.className = `dmg-text ${color}`;
  el.textContent = text;
  const rect = canvas.getBoundingClientRect();
  const wrapRect = wrap.getBoundingClientRect();
  el.style.left = (rect.left - wrapRect.left + x - 30) + 'px';
  el.style.top = (rect.top - wrapRect.top + y - 20) + 'px';
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

// Render dirty-flag system. Set when something visual changes; cleared after each redraw.
// World still redraws periodically for animations (water, day/night), but full redraw only when dirty.
let renderDirty = true;
let lastDayPhaseFrame = -1;
function markDirty() { renderDirty = true; }

function tickLoop() {
  animFrame++;
  renderTick++;
  // Movement input
  if (!activeBattle && !document.getElementById('modal-bg').classList.contains('open')) {
    const now = Date.now();
    if (now - lastMoveTs > 130) {
      if (keys['w'] || keys['arrowup']) { lastMoveTs = now; if (interior) moveBaseInteriorBy(0,-1); else moveBy(0,-1); markDirty(); }
      else if (keys['s'] || keys['arrowdown']) { lastMoveTs = now; if (interior) moveBaseInteriorBy(0,1); else moveBy(0,1); markDirty(); }
      else if (keys['a'] || keys['arrowleft']) { lastMoveTs = now; if (interior) moveBaseInteriorBy(-1,0); else moveBy(-1,0); markDirty(); }
      else if (keys['d'] || keys['arrowright']) { lastMoveTs = now; if (interior) moveBaseInteriorBy(1,0); else moveBy(1,0); markDirty(); }
    }
  }
  // Day/night phase change → mark dirty (re-tint the world)
  const phase = getCyclePhase ? getCyclePhase() : { isDay: true, progress: 0 };
  const phaseSlot = Math.floor((phase.progress || 0) * 12); // 12 slots per cycle = ~1 dirty per minute of day
  if (phaseSlot !== lastDayPhaseFrame) { lastDayPhaseFrame = phaseSlot; markDirty(); }

  // Animated rendering: redraw every 6 frames if interior shows water/torches, otherwise only when dirty
  // Water/day-night animation still needs ticking; do it every 6 frames (~10fps) which is plenty for ambient motion
  const wantAnimTick = (renderTick % 6) === 0;
  if (renderDirty || wantAnimTick) {
    if (!interior) renderWorld(); else renderInterior();
    renderDirty = false;
  }
  // Heavier UI-side things only every ~1 sec (60 frames @60fps)
  if (renderTick % 60 === 0) {
    renderMinimap();
    updateTimeHUD();
    if (me.hp < me.maxHp) { me.hp = Math.min(me.maxHp, me.hp + 1); updateHUD(); }
  }
  requestAnimationFrame(tickLoop);
}

// ============================================================
// BATTLE SYSTEM — REWRITTEN WITH EXPLICIT STATE MACHINE
// Phases:
//   pick_move        — waiting for player to select move/item/switch
//   resolving        — turn is executing (animations, damage)
//   must_switch      — player active fainted, must pick another
//   ended            — battle concluded, showing end screen with OK button
// KEY FIX: any HP-zero event on enemy or all-party sets phase='ended'
//   and calls renderBattleUI() synchronously. No setTimeout races.
// ============================================================

function buildPlayerCombatant() {
  const bestSword = findBestTool('weapon');
  const atkBonus = (bestSword?.bonus?.atk) || 0;
  const defBonus = (findBestTool('armor')?.bonus?.def) || 0;
  const hpBonus  = (findBestTool('armor')?.bonus?.hp)  || 0;
  const tier = bestSword?.tier || 0;
  const moves = [
    { key: tier >= 4 ? '_slash_gold' : (tier >= 3 ? '_slash_iron' : (tier >= 2 ? '_slash_copper' : (tier >= 1 ? '_slash_stone' : '_punch'))), pp: 99 },
    { key: '_brace', pp: 10 },
    { key: '_heavy', pp: 10 },
  ];
  if (invHave('potion') > 0) {
    moves.push({ key: '_potion', pp: invHave('potion') });
  }
  return {
    id: '_player', isPlayer: true, species: '_player',
    nickname: nickname,
    lvl: me.lvl,
    hp: me.hp, maxHp: me.maxHp + hpBonus,
    ivs: { hp: 15, atk: 15 + atkBonus, def: 15 + defBonus, spd: 15 },
    moves, status: null, statusTurnsLeft: 0,
    statMods: { atk: 0, def: 0, spd: 0 },
    _atkBonus: atkBonus, _defBonus: defBonus
  };
}

// Sanitize a battle state object: ensures hp, maxHp, lvl, ivs, etc. on all combatants are valid numbers.
// Called after battle init, after damage application, and after switch-in to prevent NaN propagation.
function sanitizeBattleState(b) {
  if (!b) return;
  // Enemy
  if (typeof b.enemyMaxHp !== 'number' || isNaN(b.enemyMaxHp) || b.enemyMaxHp <= 0) b.enemyMaxHp = 1;
  if (b.enemy) {
    if (typeof b.enemy.hp !== 'number' || isNaN(b.enemy.hp)) b.enemy.hp = b.enemyMaxHp;
    if (b.enemy.hp < 0) b.enemy.hp = 0;
    if (b.enemy.hp > b.enemyMaxHp) b.enemy.hp = b.enemyMaxHp;
    if (typeof b.enemy.lvl !== 'number' || isNaN(b.enemy.lvl)) b.enemy.lvl = 1;
  }
  // Party
  if (Array.isArray(b.party)) {
    for (const c of b.party) {
      if (!c) continue;
      if (c.isPlayer) {
        if (typeof c.maxHp !== 'number' || isNaN(c.maxHp) || c.maxHp <= 0) c.maxHp = 100;
        if (typeof c.hp !== 'number' || isNaN(c.hp)) c.hp = c.maxHp;
        if (c.hp < 0) c.hp = 0;
        if (c.hp > c.maxHp) c.hp = c.maxHp;
        if (typeof c.lvl !== 'number' || isNaN(c.lvl)) c.lvl = 1;
        continue;
      }
      const sp = SPECIES[c.species];
      const computedMax = sp ? calcStat('hp', sp.s[0], (c.ivs && c.ivs.hp) || 15, c.lvl || 1) : 20;
      if (typeof c.maxHp !== 'number' || isNaN(c.maxHp) || c.maxHp <= 0) c.maxHp = computedMax;
      if (typeof c.hp !== 'number' || isNaN(c.hp)) c.hp = c.maxHp;
      if (c.hp < 0) c.hp = 0;
      if (c.hp > c.maxHp) c.hp = c.maxHp;
      if (typeof c.lvl !== 'number' || isNaN(c.lvl) || c.lvl < 1) c.lvl = 1;
      if (!c.ivs) c.ivs = { hp:15, atk:15, def:15, spd:15 };
      for (const k of ['hp','atk','def','spd']) {
        if (typeof c.ivs[k] !== 'number' || isNaN(c.ivs[k])) c.ivs[k] = 15;
      }
      if (!c.statMods) c.statMods = { atk:0, def:0, spd:0 };
    }
  }
}

function startWildBattle(anchorId, spawn) {
  const sp = SPECIES[spawn.species];
  if (!sp) return;
  const enemy = makeCreatureInstance(spawn.species, spawn.level);
  activeBattle = {
    type: 'wild',
    anchorId,
    enemy,
    enemyMaxHp: enemy.maxHp,
    party: [buildPlayerCombatant(), ...me.party],
    activeIdx: me.party.length > 0 ? 1 : 0,  // default to first creature, else player
    phase: 'pick_move',
    log: [`A wild ${sp.n} appeared!`],
    canCatch: true,
    turn: 0,
    xpReward: 0,
    goldReward: 0,
    caught: false,
    fled: false,
  };
  sanitizeBattleState(activeBattle);
  me.seen[spawn.species] = me.seen[spawn.species] || { seen: true };
  renderBattleUI();
}

function startNpcBattle(npc, village) {
  const sp = SPECIES[npc.quest.speciesKey] || SPECIES.emberpup;
  const enemy = makeCreatureInstance(npc.quest.speciesKey || 'emberpup', npc.quest.lvl || 15);
  activeBattle = {
    type: 'npc', npcId: npc.id, villageId: village.id,
    enemy, enemyMaxHp: enemy.maxHp,
    party: [buildPlayerCombatant(), ...me.party],
    activeIdx: me.party.length > 0 ? 1 : 0,
    phase: 'pick_move',
    log: [`${npc.name} challenges you with a ${sp.n}!`],
    canCatch: false, turn: 0, xpReward: 0, goldReward: 0, caught: false, fled: false,
    questReward: npc.quest.reward
  };
  sanitizeBattleState(activeBattle);
  renderBattleUI();
}

function startPvpBattle(enemyData) {
  const enemyCreature = enemyData.party && enemyData.party.length ? enemyData.party[0] : makeCreatureInstance('emberpup', enemyData.lvl || 10);
  ensureCreatureSchema(enemyCreature);
  activeBattle = {
    type: 'pvp', opponent: enemyData.nickname,
    enemy: enemyCreature,
    enemyMaxHp: enemyCreature.maxHp,
    party: [buildPlayerCombatant(), ...me.party],
    activeIdx: me.party.length > 0 ? 1 : 0,
    phase: 'pick_move',
    log: [`${enemyData.nickname} challenges you!`],
    canCatch: false, turn: 0, fled: false,
  };
  sanitizeBattleState(activeBattle);
  renderBattleUI();
}

// Central function — renders the battle modal based on current phase
function renderBattleUI() {
  const b = activeBattle;
  if (!b) return;

  const enemy = b.enemy;
  const active = b.party[b.activeIdx];
  const enSp = SPECIES[enemy.species];
  const acSp = SPECIES[active.species];

  // Sanitize HP — NaN-proof the display
  const acMax = active.maxHp || (acSp ? calcStat('hp', acSp.s[0], active.ivs?.hp || 15, active.lvl || 1) : 1);
  if (typeof active.hp !== 'number' || isNaN(active.hp) || active.hp < 0 || active.hp > acMax) active.hp = acMax;
  if (typeof enemy.hp !== 'number' || isNaN(enemy.hp) || enemy.hp < 0) enemy.hp = b.enemyMaxHp;

  const enHpPct = Math.max(0, enemy.hp / b.enemyMaxHp);
  const acHpPct = Math.max(0, active.hp / acMax);

  const hpClass = (p) => p > 0.5 ? '' : (p > 0.25 ? 'mid' : 'low');

  const enName = enSp.n + (b.type === 'wild' ? ' (Wild)' : '');
  const acName = active.isPlayer ? nickname : (active.nickname || acSp.n);

  const logHTML = b.log.slice(-6).map(l => `<div>${l}</div>`).join('');

  const statusIcons = (c) => {
    if (!c.status) return '';
    const m = { burn:'🔥', poison:'☠️', freeze:'🧊', paralyze:'⚡', sleep:'💤' };
    return m[c.status] || '';
  };

  let actionsHTML = '';
  if (b.phase === 'pick_move') {
    actionsHTML = `<div class="battle-main-grid">
      <button class="btn primary" id="ba-fight">Fight</button>
      <button class="btn" id="ba-party">Party</button>
      ${b.canCatch ? `<button class="btn" id="ba-catch">Catch</button>` : `<button class="btn" disabled>—</button>`}
      <button class="btn" id="ba-flee">Flee</button>
    </div>`;
  } else if (b.phase === 'pick_fight') {
    actionsHTML = '<div class="battle-action-grid">';
    for (let i = 0; i < 4; i++) {
      const mv = active.moves[i];
      if (!mv) { actionsHTML += `<button class="move-btn disabled" disabled>—</button>`; continue; }
      const mvDef = MOVES[mv.key];
      actionsHTML += `<button class="move-btn" data-mv="${i}" ${mv.pp <= 0 ? 'disabled' : ''}>
        <div class="move-name">${mvDef.name}</div>
        <div class="move-meta"><span class="type-badge type-${mvDef.type}">${mvDef.type}</span> PWR ${mvDef.power || '-'} · PP ${mv.pp}/${mvDef.pp}</div>
      </button>`;
    }
    actionsHTML += '</div>';
    actionsHTML += `<button class="btn" id="ba-back" style="width:100%;margin-top:4px">← Back</button>`;
  } else if (b.phase === 'pick_party' || b.phase === 'must_switch') {
    actionsHTML = '<div class="party-mini-grid">';
    for (let i = 0; i < b.party.length; i++) {
      const c = b.party[i];
      const sp = SPECIES[c.species];
      const hpMax = c.maxHp || calcStat('hp', sp.s[0], c.ivs.hp, c.lvl);
      const pct = c.hp / hpMax;
      const isActive = i === b.activeIdx;
      const fainted = c.hp <= 0;
      actionsHTML += `<div class="party-mini-slot ${isActive ? 'active' : ''} ${fainted ? 'fainted' : ''}" data-idx="${i}">
        <div class="sprite">${sp.g}</div>
        <div class="lvl">L${c.lvl}</div>
        <div class="hp-mini"><div class="hp-mini-fill" style="transform:scaleX(${pct})"></div></div>
      </div>`;
    }
    actionsHTML += '</div>';
    if (b.phase === 'pick_party') actionsHTML += `<button class="btn" id="ba-back" style="width:100%;margin-top:4px">← Back</button>`;
  } else if (b.phase === 'resolving') {
    actionsHTML = `<div style="text-align:center;padding:14px;color:var(--text-dim);font-size:11px;letter-spacing:2px">RESOLVING…</div>`;
  } else if (b.phase === 'ended') {
    // End screen — this is the bug fix target
    const title = b.victory ? 'VICTORY' : (b.caught ? 'CAUGHT' : (b.fled ? 'FLED' : 'DEFEAT'));
    const titleColor = b.victory || b.caught ? 'var(--green)' : (b.fled ? 'var(--amber)' : 'var(--red)');
    actionsHTML = `<div style="text-align:center;padding:14px">
      <div style="font-family:var(--display);font-size:36px;letter-spacing:4px;color:${titleColor};margin-bottom:8px">${title}</div>`;
    if (b.xpReward) actionsHTML += `<div style="color:var(--blue);font-size:12px">+${b.xpReward} XP</div>`;
    if (b.goldReward) actionsHTML += `<div style="color:var(--amber);font-size:12px">+${b.goldReward} gold</div>`;
    if (b.caught) actionsHTML += `<div style="color:var(--green);font-size:12px">${enSp.n} joined your team!</div>`;
    if (b.levelUps && b.levelUps.length) {
      for (const lu of b.levelUps) actionsHTML += `<div style="color:var(--amber);font-size:11px">${lu}</div>`;
    }
    actionsHTML += `</div><button class="btn primary" id="ba-end" style="width:100%">Continue</button>`;
  }

  const bodyHTML = `
    <div class="battle-arena">
      <div class="battle-row">
        <div class="battle-side">
          <div class="battle-sprite">${acSp.g}</div>
          <div class="battle-name">${acName}</div>
          <div class="battle-sublabel">Lv ${active.lvl} ${active.isPlayer ? '' : '<span class="type-badge type-' + acSp.t + '">' + acSp.t + '</span>'}</div>
          <div class="battle-hp-wrap">
            <div class="battle-hp-bar"><div class="battle-hp-fill ${hpClass(acHpPct)}" style="transform:scaleX(${acHpPct})"></div></div>
            <div class="battle-hp-text">${active.hp}/${active.maxHp || calcStat('hp', acSp.s[0], active.ivs.hp, active.lvl)}</div>
          </div>
          <div class="battle-status-icons">${statusIcons(active)}</div>
        </div>
        <div class="battle-vs">VS</div>
        <div class="battle-side">
          <div class="battle-sprite">${enSp.g}</div>
          <div class="battle-name">${enName}</div>
          <div class="battle-sublabel">Lv ${enemy.lvl} <span class="type-badge type-${enSp.t}">${enSp.t}</span> <span class="rar-${enSp.r}">${enSp.r}</span></div>
          <div class="battle-hp-wrap">
            <div class="battle-hp-bar"><div class="battle-hp-fill ${hpClass(enHpPct)}" style="transform:scaleX(${enHpPct})"></div></div>
            <div class="battle-hp-text">${enemy.hp}/${b.enemyMaxHp}</div>
          </div>
          <div class="battle-status-icons">${statusIcons(enemy)}</div>
        </div>
      </div>
    </div>
    <div id="battle-log">${logHTML}</div>
    ${actionsHTML}
  `;

  openModal({
    title: b.type === 'wild' ? 'WILD BATTLE' : (b.type === 'pvp' ? 'PvP DUEL' : 'DUEL'),
    bodyHTML,
    buttons: [],
    forceOpen: true,  // cannot close X-out of battle
    wide: true,
    onBody: (body) => {
      // Wire handlers
      const q = (s) => body.querySelector(s) || body.parentElement.querySelector(s);
      const fight = document.getElementById('ba-fight');
      const party = document.getElementById('ba-party');
      const catchBtn = document.getElementById('ba-catch');
      const flee = document.getElementById('ba-flee');
      const back = document.getElementById('ba-back');
      const endBtn = document.getElementById('ba-end');

      if (fight) fight.addEventListener('click', () => { activeBattle.phase = 'pick_fight'; renderBattleUI(); });
      if (party) party.addEventListener('click', () => { activeBattle.phase = 'pick_party'; renderBattleUI(); });
      if (catchBtn) catchBtn.addEventListener('click', onAttemptCatch);
      if (flee) flee.addEventListener('click', onAttemptFlee);
      if (back) back.addEventListener('click', () => { activeBattle.phase = 'pick_move'; renderBattleUI(); });
      if (endBtn) endBtn.addEventListener('click', closeBattle);

      // Move buttons
      body.querySelectorAll('[data-mv]').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.getAttribute('data-mv'));
          onPickMove(idx);
        });
      });
      // Party slots
      body.querySelectorAll('[data-idx]').forEach(el => {
        el.addEventListener('click', () => {
          const idx = parseInt(el.getAttribute('data-idx'));
          onSwitchTo(idx);
        });
      });
    }
  });
  // Apply input lock based on current phase
  const modalEl = document.getElementById('modal');
  if (modalEl) {
    const inputLocked = !battleAcceptsInput() && b.phase !== 'ended';
    modalEl.classList.toggle('battle-locked', inputLocked);
  }
}

function battleLog(msg) {
  if (!activeBattle) return;
  activeBattle.log.push(msg);
  if (activeBattle.log.length > 30) activeBattle.log = activeBattle.log.slice(-30);
}

// ============================================================
// BATTLE ACTIONS
// ============================================================
async function onPickMove(moveIdx) {
  const b = activeBattle;
  if (!b || b.phase !== 'pick_fight') return;
  const active = b.party[b.activeIdx];
  const move = active.moves[moveIdx];
  if (!move || move.pp <= 0) return;

  // Handle _potion specifically
  if (move.key === '_potion') {
    const hadPotion = invHave('potion') > 0;
    if (!hadPotion) { battleLog("You're out of potions."); renderBattleUI(); return; }
    invRemove('potion', 1);
    move.pp--;
  } else {
    move.pp--;
  }

  b.phase = 'resolving';
  renderBattleUI();

  // Speed: who goes first
  const enemy = b.enemy;
  const enSp = SPECIES[enemy.species];
  const enemyMoveIdx = pickEnemyMove(enemy);
  const enemyMove = enemy.moves[enemyMoveIdx];
  const playerSpd = calcStatBattle(active, 'spd');
  const enemySpd = calcStatBattle(enemy, 'spd');
  const playerPrio = MOVES[move.key].priority || 0;
  const enemyPrio = MOVES[enemyMove.key].priority || 0;
  const playerFirst = (playerPrio > enemyPrio) || (playerPrio === enemyPrio && playerSpd >= enemySpd);

  const pTurn = () => performMove(active, enemy, move, true);
  const eTurn = () => performMove(enemy, active, enemyMove, false);

  await delay(450);
  if (playerFirst) {
    pTurn();
    if (checkEndAfterAction()) return;
    await delay(700);
    if (active.hp > 0 && enemy.hp > 0) eTurn();
  } else {
    eTurn();
    if (checkEndAfterAction()) return;
    await delay(700);
    if (active.hp > 0 && enemy.hp > 0) pTurn();
  }
  if (checkEndAfterAction()) return;
  await delay(500);
  endOfTurn();
  if (checkEndAfterAction()) return;
  b.phase = 'pick_move';
  renderBattleUI();
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// Battle input gate: only these phases accept user input.
// Used by all battle action handlers to prevent rapid-click race conditions.
function battleAcceptsInput() {
  const b = activeBattle;
  if (!b) return false;
  return ['pick_move', 'pick_fight', 'pick_party', 'must_switch'].includes(b.phase);
}

function calcStatBattle(c, stat) {
  if (c.isPlayer) {
    if (stat === 'atk') return 10 + c.lvl * 2 + (c._atkBonus || 0);
    if (stat === 'def') return 5 + c.lvl + (c._defBonus || 0);
    if (stat === 'spd') return 10 + c.lvl;
  }
  const sp = SPECIES[c.species];
  const baseIdx = { hp:0, atk:1, def:2, spd:3 }[stat];
  let v = calcStat(stat, sp.s[baseIdx], c.ivs[stat], c.lvl);
  const mod = c.statMods?.[stat] || 0;
  if (mod > 0) v *= (2 + mod) / 2;
  else if (mod < 0) v *= 2 / (2 - mod);
  if (stat === 'spd' && c.status === 'paralyze') v *= 0.5;
  if (stat === 'atk' && c.status === 'burn') v *= 0.5;
  return Math.floor(v);
}

function pickEnemyMove(c) {
  const available = c.moves.map((m, i) => ({ m, i })).filter(x => x.m.pp > 0);
  if (!available.length) return 0;
  // Smart-ish: prefer damage moves > 40 power
  const damaging = available.filter(x => (MOVES[x.m.key].power || 0) > 0);
  if (damaging.length && Math.random() < 0.85) {
    damaging.sort((a, b) => MOVES[b.m.key].power - MOVES[a.m.key].power);
    return damaging[Math.floor(Math.random() * Math.min(damaging.length, 2))].i;
  }
  return available[Math.floor(Math.random() * available.length)].i;
}

function performMove(attacker, defender, move, isPlayer) {
  const def = MOVES[move.key];
  const atSp = SPECIES[attacker.species];
  const defSp = SPECIES[defender.species];
  const atName = attacker.isPlayer ? nickname : (attacker.nickname || atSp.n);
  const defName = defender.isPlayer ? nickname : (defender.nickname || defSp.n);

  // Status prevents action
  if (attacker.status === 'sleep') {
    if (Math.random() < 0.33 || attacker.statusTurnsLeft <= 0) {
      attacker.status = null; attacker.statusTurnsLeft = 0;
      battleLog(`${atName} woke up!`);
    } else {
      attacker.statusTurnsLeft--;
      battleLog(`${atName} is asleep.`); return;
    }
  }
  if (attacker.status === 'freeze') {
    if (Math.random() < 0.25) { attacker.status = null; attacker.statusTurnsLeft = 0; battleLog(`${atName} thawed out!`); }
    else { battleLog(`${atName} is frozen!`); return; }
  }
  if (attacker.status === 'paralyze' && Math.random() < 0.25) { battleLog(`${atName} is paralyzed!`); return; }

  battleLog(`${atName} used ${def.name}!`);

  // Accuracy
  if (def.acc < 100 && Math.random() * 100 > def.acc) {
    battleLog(`${atName}'s attack missed!`); return;
  }

  // Stat-only moves
  if (def.power === 0) {
    if (def.healSelf) {
      const heal = Math.floor((attacker.maxHp || calcStat('hp', atSp.s[0], attacker.ivs.hp, attacker.lvl)) * def.healSelf);
      attacker.hp = Math.min(attacker.maxHp || calcStat('hp', atSp.s[0], attacker.ivs.hp, attacker.lvl), attacker.hp + heal);
      battleLog(`${atName} restored ${heal} HP!`);
    }
    if (def.stat) {
      if (def.stat.self) for (const [k, v] of Object.entries(def.stat.self)) {
        attacker.statMods[k] = clamp((attacker.statMods[k] || 0) + v, -6, 6);
        battleLog(`${atName}'s ${k.toUpperCase()} ${v > 0 ? 'rose' : 'fell'}!`);
      }
      if (def.stat.enemy) for (const [k, v] of Object.entries(def.stat.enemy)) {
        defender.statMods[k] = clamp((defender.statMods[k] || 0) + v, -6, 6);
        battleLog(`${defName}'s ${k.toUpperCase()} ${v > 0 ? 'rose' : 'fell'}!`);
      }
    }
    if (def.effect && def.effect.status && (!defender.status)) {
      const chance = def.effect.chance || 100;
      if (Math.random() * 100 < chance) {
        defender.status = def.effect.status;
        defender.statusTurnsLeft = 2 + Math.floor(Math.random() * 4);  // 2-5 turns
        battleLog(`${defName} was ${def.effect.status}ed!`);
      }
    }
    return;
  }

  // Damage calculation
  const atk = calcStatBattle(attacker, 'atk');
  const defStat = calcStatBattle(defender, 'def');
  const power = def.power || 0;
  let dmg = Math.floor(((2 * attacker.lvl / 5 + 2) * power * atk / Math.max(1, defStat)) / 50) + 2;
  // STAB
  if (!attacker.isPlayer && atSp.t === def.type) dmg = Math.floor(dmg * 1.5);
  // Type effectiveness
  const eff = TYPE_CHART[def.type]?.[defSp.t] ?? 1;
  dmg = Math.floor(dmg * eff);
  // Crit
  const crit = (Math.random() < (def.crit ? 0.25 : 0.0625)) ? 2 : 1;
  dmg = Math.floor(dmg * crit);
  // Random factor
  dmg = Math.floor(dmg * (0.85 + Math.random() * 0.15));
  if (isNaN(dmg) || dmg < 1) dmg = 1;
  dmg = Math.max(1, dmg);

  // NaN-proof HP application — if defender.hp is somehow NaN, treat as full HP first
  const defMax = defender.maxHp || 1;
  if (typeof defender.hp !== 'number' || isNaN(defender.hp)) defender.hp = defMax;
  defender.hp = Math.max(0, Math.min(defMax, defender.hp - dmg));
  if (!defender.isPlayer) {}
  else me.hp = defender.hp;

  battleLog(`${defName} took ${dmg} damage!${eff >= 2 ? ' Super effective!' : eff <= 0.5 && eff > 0 ? ' Not very effective.' : eff === 0 ? ' No effect.' : ''}${crit > 1 ? ' Critical hit!' : ''}`);

  // Drain
  if (def.drain && dmg > 0) {
    const drain = Math.floor(dmg * def.drain);
    const amax = attacker.maxHp || calcStat('hp', atSp.s[0], attacker.ivs.hp, attacker.lvl);
    attacker.hp = Math.min(amax, attacker.hp + drain);
    battleLog(`${atName} absorbed ${drain} HP!`);
  }

  // Status effect
  if (def.effect && def.effect.status && !defender.status && defender.hp > 0) {
    const chance = def.effect.chance || 100;
    if (Math.random() * 100 < chance) {
      defender.status = def.effect.status;
      defender.statusTurnsLeft = 2 + Math.floor(Math.random() * 4);
      battleLog(`${defName} was ${def.effect.status}ed!`);
    }
  }
  // Stat on hit
  if (def.effect && def.effect.stat) {
    const chance = def.effect.chance || 100;
    if (Math.random() * 100 < chance) {
      if (def.effect.stat.enemy) for (const [k, v] of Object.entries(def.effect.stat.enemy)) {
        defender.statMods[k] = clamp((defender.statMods[k] || 0) + v, -6, 6);
        battleLog(`${defName}'s ${k.toUpperCase()} ${v > 0 ? 'rose' : 'fell'}!`);
      }
    }
  }
}

function endOfTurn() {
  const b = activeBattle;
  if (!b) return;
  for (const c of [b.party[b.activeIdx], b.enemy]) {
    if (!c || c.hp <= 0) continue;
    // Status damage
    if (c.status === 'burn' || c.status === 'poison') {
      const maxHp = c.maxHp || calcStat('hp', SPECIES[c.species].s[0], c.ivs.hp, c.lvl);
      const dmg = Math.floor(maxHp / 8);
      c.hp = Math.max(0, c.hp - dmg);
      if (c.isPlayer) me.hp = c.hp;
      const name = c.isPlayer ? nickname : (c.nickname || SPECIES[c.species].n);
      battleLog(`${name} is hurt by ${c.status}! (-${dmg} HP)`);
    }
    // Decrement duration
    if (c.statusTurnsLeft > 0) {
      c.statusTurnsLeft--;
      if (c.statusTurnsLeft <= 0 && c.status) {
        const name = c.isPlayer ? nickname : (c.nickname || SPECIES[c.species].n);
        battleLog(`${name} recovered from ${c.status}!`);
        c.status = null;
      }
    }
  }
  b.turn++;
}

// THE CRITICAL FIX: check for end condition after EVERY action
// If enemy HP zero OR all party fainted → set phase='ended' immediately
// and render end screen. No setTimeout races.
function checkEndAfterAction() {
  const b = activeBattle;
  if (!b) return true;
  if (b.phase === 'ended') { renderBattleUI(); return true; }

  // Enemy fainted?
  if (b.enemy.hp <= 0) {
    return onEnemyFainted();
  }
  // All player side fainted?
  const active = b.party[b.activeIdx];
  if (active.hp <= 0) {
    // any other alive?
    const otherAlive = b.party.some((c, i) => i !== b.activeIdx && c.hp > 0);
    if (!otherAlive) {
      onBattleDefeat();
      return true;
    }
    // Must switch
    b.phase = 'must_switch';
    battleLog(`${active.isPlayer ? nickname : (active.nickname || SPECIES[active.species].n)} fainted!`);
    renderBattleUI();
    return true;
  }
  return false;
}

function onEnemyFainted() {
  const b = activeBattle;
  const enSp = SPECIES[b.enemy.species];
  battleLog(`${enSp.n} fainted!`);

  // Award XP to player creatures that participated (simplified: just the active one if it's a creature)
  const xpGain = Math.floor((b.enemy.lvl * 12 + 30) * RARITY_XP_MULT[enSp.r]);
  const goldGain = Math.floor(5 + b.enemy.lvl * 1.5 + Math.random() * 10);
  b.xpReward = xpGain;
  b.goldReward = goldGain;
  b.levelUps = [];

  const active = b.party[b.activeIdx];
  if (!active.isPlayer) {
    const realCreature = me.party.find(c => c.id === active.id);
    if (realCreature) {
      const preLvl = realCreature.lvl;
      creatureGainXp(realCreature, xpGain);
      if (realCreature.lvl > preLvl) b.levelUps.push(`${SPECIES[realCreature.species].n} grew to level ${realCreature.lvl}!`);
      // Sync active HP from real creature post-xp (for display purposes only)
      active.lvl = realCreature.lvl;
      active.maxHp = realCreature.maxHp;
      active.species = realCreature.species;
    }
  } else {
    const preLvl = me.lvl;
    me.xp += xpGain;
    me.lvl = levelFromXp(me.xp);
    if (me.lvl > preLvl) {
      const hpBonus = (me.lvl - preLvl) * 10;
      me.maxHp += hpBonus; me.hp = me.maxHp;
      b.levelUps.push(`You reached level ${me.lvl}! (+${hpBonus} max HP)`);
    }
  }
  me.gold += goldGain;
  me.battleWins = (me.battleWins || 0) + 1;

  // Quest progress
  for (const [qid, q] of Object.entries(me.quests || {})) {
    if (q.completed) continue;
    if (q.quest.type === 'defeat' && q.quest.elementType === enSp.t) {
      q.progress = (q.progress || 0) + 1;
      if (q.progress >= q.quest.amount) addLog(`Quest ready to turn in: defeat ${q.quest.elementType} creatures.`, 'good');
    }
  }

  // Mark defeated wildlife anchor
  if (b.anchorId) {
    set(ref(db, `wildlifeDefeats/${b.anchorId}`), Date.now());
    wildlifeDefeats[b.anchorId] = Date.now();
  }

  b.victory = true;
  b.phase = 'ended';
  renderBattleUI();
  return true;
}

function onBattleDefeat() {
  const b = activeBattle;
  battleLog(`Your team was defeated...`);
  me.hp = Math.max(1, Math.floor(me.maxHp * 0.5));
  me.party.forEach(c => { if (c.hp <= 0) c.hp = Math.max(1, Math.floor(c.maxHp * 0.25)); });
  me.battleLosses = (me.battleLosses || 0) + 1;
  me.gold = Math.max(0, me.gold - Math.floor(me.gold * 0.1));
  b.victory = false;
  b.phase = 'ended';
  // Send back to base
  me.x = myBase.x; me.y = myBase.y + 1;
  renderBattleUI();
}

function onSwitchTo(idx) {
  const b = activeBattle;
  if (!b) return;
  if (!battleAcceptsInput()) return;
  const c = b.party[idx];
  if (!c || c.hp <= 0) return;
  if (idx === b.activeIdx) {
    if (b.phase === 'pick_party') { b.phase = 'pick_move'; renderBattleUI(); }
    return;
  }
  const wasFaint = b.party[b.activeIdx].hp <= 0;
  const sp = SPECIES[c.species];
  battleLog(`Go ${c.isPlayer ? nickname : (c.nickname || sp.n)}!`);
  b.activeIdx = idx;
  if (wasFaint || b.phase === 'pick_party') {
    // Voluntary switch — costs turn (enemy gets free hit) if voluntary
    if (!wasFaint) {
      const enemyMoveIdx = pickEnemyMove(b.enemy);
      const enemyMove = b.enemy.moves[enemyMoveIdx];
      b.phase = 'resolving';
      renderBattleUI();
      (async () => {
        await delay(350);
        performMove(b.enemy, b.party[idx], enemyMove, false);
        if (checkEndAfterAction()) return;
        await delay(400);
        endOfTurn();
        if (checkEndAfterAction()) return;
        b.phase = 'pick_move';
        renderBattleUI();
      })();
      return;
    }
    b.phase = 'pick_move';
  }
  renderBattleUI();
}

async function onAttemptCatch() {
  const b = activeBattle;
  if (!b || !b.canCatch) return;
  if (!battleAcceptsInput()) return; // race-condition guard
  let netKey = null;
  if (invHave('master_net') > 0) netKey = 'master_net';
  else if (invHave('tame_net') > 0) netKey = 'tame_net';
  if (!netKey) {
    battleLog(`No nets! Craft one at the workbench.`);
    renderBattleUI();
    return;
  }
  invRemove(netKey, 1);
  const enSp = SPECIES[b.enemy.species];
  const hpRatio = b.enemy.hp / b.enemyMaxHp;
  let baseChance = RARITY_CATCH_MULT[enSp.r] * (1 - hpRatio * 0.7);
  if (netKey === 'master_net') baseChance *= 2;
  if (b.enemy.status) baseChance += 0.15;
  baseChance = clamp(baseChance, 0.02, 0.95);
  b.phase = 'resolving';
  battleLog(`You throw a ${ITEMS[netKey].name}!`);
  renderBattleUI();
  await delay(800);
  if (Math.random() < baseChance) {
    // Caught
    const caught = makeCreatureInstance(b.enemy.species, b.enemy.lvl, b.enemy.ivs);
    caught.hp = b.enemy.hp;
    if (me.party.length < PARTY_SIZE) me.party.push(caught);
    else me.creatureStorage[caught.id] = caught;
    me.seen[b.enemy.species] = { seen:true, caught:true };
    battleLog(`Gotcha! ${enSp.n} was caught!`);
    b.caught = true;
    b.victory = true;
    b.goldReward = 10;
    me.gold += 10;
    if (b.anchorId) { set(ref(db, `wildlifeDefeats/${b.anchorId}`), Date.now()); wildlifeDefeats[b.anchorId] = Date.now(); }
    b.phase = 'ended';
    renderBattleUI();
  } else {
    battleLog(`${enSp.n} broke free!`);
    // Enemy gets a turn
    const enemyMoveIdx = pickEnemyMove(b.enemy);
    const enemyMove = b.enemy.moves[enemyMoveIdx];
    await delay(500);
    performMove(b.enemy, b.party[b.activeIdx], enemyMove, false);
    if (checkEndAfterAction()) return;
    await delay(400);
    endOfTurn();
    if (checkEndAfterAction()) return;
    b.phase = 'pick_move';
    renderBattleUI();
  }
}

async function onAttemptFlee() {
  const b = activeBattle;
  if (!b) return;
  if (!battleAcceptsInput()) return;
  if (b.type !== 'wild') {
    battleLog("You can't flee this battle.");
    renderBattleUI();
    return;
  }
  const active = b.party[b.activeIdx];
  const chance = clamp(0.5 + (calcStatBattle(active, 'spd') - calcStatBattle(b.enemy, 'spd')) / 100, 0.3, 0.95);
  if (Math.random() < chance) {
    b.fled = true; b.phase = 'ended';
    battleLog('You got away safely.');
    renderBattleUI();
  } else {
    battleLog("Couldn't escape!");
    b.phase = 'resolving';
    renderBattleUI();
    const enemyMoveIdx = pickEnemyMove(b.enemy);
    const enemyMove = b.enemy.moves[enemyMoveIdx];
    await delay(500);
    performMove(b.enemy, active, enemyMove, false);
    if (checkEndAfterAction()) return;
    await delay(400);
    endOfTurn();
    if (checkEndAfterAction()) return;
    b.phase = 'pick_move';
    renderBattleUI();
  }
}

function closeBattle() {
  const b = activeBattle;
  if (!b) { closeModal(); return; }
  // Apply final HP changes to real party creatures
  for (let i = 1; i < b.party.length; i++) {
    const battleC = b.party[i];
    const real = me.party.find(c => c.id === battleC.id);
    if (real) {
      real.hp = battleC.hp;
      real.status = battleC.status;
      real.statusTurnsLeft = battleC.statusTurnsLeft || 0;
    }
  }
  // NPC quest completion
  if (b.type === 'npc' && b.victory && b.questReward) {
    if (b.questReward.gold) { me.gold += b.questReward.gold; addLog(`+${b.questReward.gold} gold from quest.`, 'good'); }
    if (b.questReward.egg && SPECIES[b.questReward.egg]) {
      const eid = 'egg_' + Date.now();
      me.eggs[eid] = { species: b.questReward.egg, hatchAt: Date.now() + EGG_HATCH_MS, ivs: { hp:randInt(10,25), atk:randInt(10,25), def:randInt(10,25), spd:randInt(10,25) } };
      addLog(`Quest reward: 🥚 egg! It will hatch in 3 min.`, 'good');
    }
    // mark quest complete
    if (me.quests[b.npcId]) {
      me.quests[b.npcId].completed = true;
    }
  }
  activeBattle = null;
  savePlayer();
  saveBase();
  renderPartyPanel();
  renderStatsPanel();
  updateHUD();
  _modalCtx = null;
  closeModal();
}


// ============================================================
// PANEL: STATS
// ============================================================
function renderStatsPanel() {
  const el = document.getElementById('tab-stats');
  if (!el || !me) return;
  const lvl = levelFromXp(me.xp);
  const xpNext = xpForLevel(lvl + 1);
  const xpCurr = xpForLevel(lvl);
  const xpPct = Math.round(((me.xp - xpCurr) / (xpNext - xpCurr)) * 100);
  const maxHp = 80 + lvl * 12 + (me.armorBonus || 0);
  const eq = me.equip || {};
  const toolSlots = ['pickaxe','axe','sword','net','rod','bow','armor'];
  let eqHTML = '';
  for (const slot of toolSlots) {
    const k = eq[slot];
    const it = k ? ITEMS[k] : null;
    eqHTML += `<div class="eq-row"><span class="eq-slot">${slot}</span><span class="eq-val">${it ? it.n : '—'}</span></div>`;
  }
  const phase = getCyclePhase();
  el.innerHTML = `
    <div class="panel-sec">
      <div class="big-name">${me.nickname}</div>
      <div class="small muted">Level ${lvl} · ${me.xp} XP</div>
      <div class="bar"><div class="bar-fill xp" style="width:${xpPct}%"></div></div>
      <div class="small muted">XP ${me.xp - xpCurr}/${xpNext - xpCurr}</div>
    </div>
    <div class="panel-sec">
      <div class="row2"><span>HP</span><span class="red">${me.hp}/${maxHp}</span></div>
      <div class="row2"><span>Gold</span><span class="gold">${me.gold}</span></div>
      <div class="row2"><span>Base</span><span>${me.hasBase ? `Lv ${myBase?.level || 1} @ ${myBase?.x || '?'},${myBase?.y || '?'}` : 'none'}</span></div>
      <div class="row2"><span>Cycle</span><span class="${phase.isDay ? 'green' : 'purple'}">${phase.isDay ? '☀ Day' : '🌙 Night'} ${Math.round(phase.progress*100)}%</span></div>
    </div>
    <div class="panel-sec">
      <div class="sec-head">Equipped</div>
      ${eqHTML}
    </div>
    <div class="panel-sec">
      <div class="sec-head">Actions</div>
      <button class="btn" id="btn-customize">Customize appearance</button>
      <button class="btn" id="btn-rest">Rest (restores HP, needs bed)</button>
      <button class="btn warn" id="btn-respawn">Return to spawn (-20% gold)</button>
    </div>
  `;
  document.getElementById('btn-customize').onclick = openCharacterCustomization;
  document.getElementById('btn-rest').onclick = tryRest;
  document.getElementById('btn-respawn').onclick = returnToSpawn;
}

function tryRest() {
  // Need to be inside own base to rest
  if (!me.insideBase || me.insideBase !== me.nickname) {
    addLog('Rest only works inside your own base.', 'warn');
    return;
  }
  me.hp = 80 + levelFromXp(me.xp) * 12 + (me.armorBonus || 0);
  // Heal party
  for (const c of me.party) {
    const sp = SPECIES[c.species];
    if (!sp) continue;
    const maxHp = calcStat('hp', sp.b.hp, c.ivs.hp, c.lvl);
    c.hp = maxHp;
    c.status = null;
    c.statusTurnsLeft = 0;
  }
  addLog('You and your party fully recovered.', 'good');
  savePlayer();
  renderStatsPanel();
  renderPartyPanel();
  updateHUD();
}

function returnToSpawn() {
  if (!confirm('Return to spawn? Cost: 20% of current gold.')) return;
  const cost = Math.floor(me.gold * 0.2);
  me.gold -= cost;
  me.x = 180 + randInt(-3, 3);
  me.y = 180 + randInt(-3, 3);
  me.insideBase = null;
  savePlayer();
  renderAll();
  updateHUD();
  addLog(`Returned to spawn. -${cost}g`, 'warn');
}

// ============================================================
// PANEL: INVENTORY
// ============================================================
function renderInventoryPanel() {
  const el = document.getElementById('tab-inv');
  if (!el || !me) return;
  const cats = { tool: [], mat: [], food: [], seed: [], potion: [], trinket: [], misc: [] };
  for (const [k, qty] of Object.entries(me.inv || {})) {
    if (qty <= 0) continue;
    const it = ITEMS[k];
    if (!it) { cats.misc.push([k, qty, { n: k, emoji: '❓' }]); continue; }
    const cat = it.cat || 'misc';
    (cats[cat] || cats.misc).push([k, qty, it]);
  }
  const labels = { tool: 'Tools', mat: 'Materials', food: 'Food', seed: 'Seeds', potion: 'Potions', trinket: 'Trinkets', misc: 'Other' };
  let html = '';
  for (const [cat, arr] of Object.entries(cats)) {
    if (!arr.length) continue;
    arr.sort((a, b) => a[2].n.localeCompare(b[2].n));
    html += `<div class="panel-sec"><div class="sec-head">${labels[cat]}</div><div class="inv-grid">`;
    for (const [k, qty, it] of arr) {
      const isEquipped = Object.values(me.equip || {}).includes(k);
      html += `
        <div class="inv-item ${isEquipped ? 'equipped' : ''}" data-item="${k}">
          <div class="inv-emoji">${it.emoji || '📦'}</div>
          <div class="inv-name">${it.n}</div>
          <div class="inv-qty">${qty}</div>
        </div>`;
    }
    html += `</div></div>`;
  }
  if (!html) html = `<div class="panel-sec muted">Inventory empty. Go harvest some trees and rocks.</div>`;
  el.innerHTML = html;
  el.querySelectorAll('.inv-item').forEach(node => {
    node.onclick = () => openItemMenu(node.dataset.item);
  });
}

function openItemMenu(key) {
  const it = ITEMS[key];
  if (!it) return;
  const qty = me.inv[key] || 0;
  const isEquippable = ['tool','weapon','armor'].includes(it.type) || ['pickaxe','axe','sword','net','rod','bow','armor'].includes(it.slot);
  const isEquipped = Object.values(me.equip || {}).includes(key);
  let buttons = [];
  if (isEquippable) {
    if (isEquipped) buttons.push({ text: 'Unequip', onclick: () => { const slot = it.slot; delete me.equip[slot]; recomputeArmor(); savePlayer(); renderInventoryPanel(); renderStatsPanel(); closeModal(); }});
    else buttons.push({ text: 'Equip', primary: true, onclick: () => { me.equip[it.slot] = key; recomputeArmor(); savePlayer(); renderInventoryPanel(); renderStatsPanel(); closeModal(); }});
  }
  if (it.cat === 'food' || it.cat === 'potion') {
    buttons.push({ text: 'Use', primary: true, onclick: () => useItem(key) });
  }
  if (it.cat === 'seed' && myBase) {
    buttons.push({ text: 'Plant', primary: true, onclick: () => { closeModal(); addLog('Go to your base and click an empty farm plot to plant.', 'info'); }});
  }
  buttons.push({ text: 'Close', onclick: () => closeModal() });
  openModal({
    title: `${it.emoji || '📦'} ${it.n}`,
    bodyHTML: `<div class="it-desc">${it.desc || ''}</div><div class="muted">Owned: ${qty}</div>`,
    buttons
  });
}

function recomputeArmor() {
  let bonus = 0;
  for (const slot of Object.values(me.equip || {})) {
    const it = ITEMS[slot];
    if (it && it.hpBonus) bonus += it.hpBonus;
  }
  me.armorBonus = bonus;
  const lvl = levelFromXp(me.xp);
  const maxHp = 80 + lvl * 12 + bonus;
  if (me.hp > maxHp) me.hp = maxHp;
}

function useItem(key) {
  const it = ITEMS[key];
  if (!it || !(me.inv[key] > 0)) return;
  const lvl = levelFromXp(me.xp);
  const maxHp = 80 + lvl * 12 + (me.armorBonus || 0);
  if (it.heal) {
    const h = Math.min(it.heal, maxHp - me.hp);
    me.hp += h;
    addLog(`+${h} HP from ${it.n}.`, 'good');
  }
  if (it.cureStatus && me.party.length) {
    for (const c of me.party) { c.status = null; c.statusTurnsLeft = 0; }
    addLog('Status effects cleared from party.', 'good');
  }
  me.inv[key]--;
  if (me.inv[key] <= 0) delete me.inv[key];
  savePlayer();
  renderInventoryPanel();
  renderStatsPanel();
  updateHUD();
  closeModal();
}


// ============================================================
// PANEL: PARTY
// ============================================================
function renderPartyPanel() {
  const el = document.getElementById('tab-party');
  if (!el || !me) return;
  let partyHTML = '';
  for (let i = 0; i < PARTY_SIZE; i++) {
    const c = me.party[i];
    if (!c) {
      partyHTML += `<div class="party-slot empty">Empty</div>`;
      continue;
    }
    const sp = SPECIES[c.species];
    if (!sp) continue;
    const maxHp = calcStat('hp', sp.b.hp, c.ivs.hp, c.lvl);
    const hpPct = Math.round((c.hp / maxHp) * 100);
    const xpNext = xpForLevel(c.lvl + 1);
    const xpCurr = xpForLevel(c.lvl);
    const xpPct = Math.round(((c.xp - xpCurr) / (xpNext - xpCurr)) * 100);
    partyHTML += `
      <div class="party-slot" data-idx="${i}">
        <div class="cr-emoji">${sp.e}</div>
        <div class="cr-info">
          <div class="cr-name">${c.name || sp.n}</div>
          <div class="cr-meta">${sp.tArr.map(t => `<span class="t-${t}">${t}</span>`).join(" ")} · Lv ${c.lvl}</div>
          <div class="bar sm"><div class="bar-fill hp" style="width:${hpPct}%"></div></div>
          <div class="small">HP ${c.hp}/${maxHp}</div>
          <div class="bar sm"><div class="bar-fill xp" style="width:${xpPct}%"></div></div>
          ${c.status ? `<div class="small warn">⚠ ${c.status} (${c.statusTurnsLeft || 0}t)</div>` : ''}
        </div>
      </div>`;
  }
  const storageKeys = Object.keys(me.creatureStorage || {});
  const eggsKeys = Object.keys(me.eggs || {});
  let storageHTML = '';
  if (storageKeys.length) {
    storageHTML = `<div class="panel-sec"><div class="sec-head">Storage (${storageKeys.length})</div><div class="storage-grid">`;
    for (const id of storageKeys.slice(0, 30)) {
      const c = me.creatureStorage[id];
      const sp = SPECIES[c.species];
      if (!sp) continue;
      storageHTML += `<div class="stored" data-sid="${id}" title="${sp.n} Lv ${c.lvl}"><div class="cr-emoji">${sp.e}</div><div class="small">Lv${c.lvl}</div></div>`;
    }
    if (storageKeys.length > 30) storageHTML += `<div class="muted small">+${storageKeys.length - 30} more</div>`;
    storageHTML += `</div></div>`;
  }
  let eggsHTML = '';
  if (eggsKeys.length) {
    eggsHTML = `<div class="panel-sec"><div class="sec-head">Eggs (${eggsKeys.length})</div><div class="egg-grid">`;
    for (const id of eggsKeys) {
      const egg = me.eggs[id];
      const sp = SPECIES[egg.species];
      const msLeft = Math.max(0, egg.hatchAt - Date.now());
      const ready = msLeft <= 0;
      eggsHTML += `<div class="egg ${ready ? 'ready' : ''}" data-eid="${id}">
        <div class="cr-emoji">🥚</div>
        <div class="small">${ready ? 'READY!' : Math.ceil(msLeft/1000) + 's'}</div>
      </div>`;
    }
    eggsHTML += `</div></div>`;
  }
  el.innerHTML = `
    <div class="panel-sec">
      <div class="sec-head">Party (${me.party.length}/${PARTY_SIZE})</div>
      <div class="party-list">${partyHTML}</div>
    </div>
    ${storageHTML}
    ${eggsHTML}
    <div class="panel-sec">
      <button class="btn" id="btn-breed">🧬 Breeding Roost</button>
      <div class="muted small">Leave two creatures together. Eggs produced offline.</div>
    </div>
  `;
  el.querySelectorAll('.party-slot[data-idx]').forEach(n => {
    n.onclick = () => openCreatureDetail('party', parseInt(n.dataset.idx));
  });
  el.querySelectorAll('.stored[data-sid]').forEach(n => {
    n.onclick = () => openCreatureDetail('storage', n.dataset.sid);
  });
  el.querySelectorAll('.egg[data-eid]').forEach(n => {
    n.onclick = () => tryHatchEgg(n.dataset.eid);
  });
  const breedBtn = document.getElementById('btn-breed');
  if (breedBtn) breedBtn.onclick = openBreedingMenu;
}

function openCreatureDetail(source, idx) {
  const c = source === 'party' ? me.party[idx] : me.creatureStorage[idx];
  if (!c) return;
  const sp = SPECIES[c.species];
  if (!sp) return;
  const maxHp = c.maxHp || calcStat('hp', sp.s[0], c.ivs.hp, c.lvl);
  const atk = calcStat('atk', sp.s[1], c.ivs.atk, c.lvl);
  const def = calcStat('def', sp.s[2], c.ivs.def, c.lvl);
  const spd = calcStat('spd', sp.s[3], c.ivs.spd, c.lvl);
  const movesHTML = (c.moves || []).map(m => {
    const mvKey = typeof m === 'string' ? m : m.key;
    const mv = MOVES[mvKey];
    return mv ? `<div class="mv-item"><span class="t-${mv.t}">${mv.n}</span><span class="muted small">PWR ${mv.p}</span></div>` : '';
  }).join('');
  const ivAvg = Math.round(((c.ivs.hp + c.ivs.atk + c.ivs.def + c.ivs.spd) / 124) * 100);
  const evoTxt = sp.evo ? `Evolves to ${SPECIES[sp.evo.to]?.n || '?'} at Lv ${sp.evo.lv || sp.evo.lvl || '?'}` : 'Final form';

  const partyFull = me.party.length >= PARTY_SIZE;
  const buttons = [];

  if (source === 'party' && me.party.length > 1) {
    buttons.push({ text: 'Send to Storage', onclick: () => {
      me.creatureStorage[c.id] = c;
      me.party.splice(idx, 1);
      savePlayer(); renderPartyPanel(); closeModal();
    }});
  }
  if (source === 'storage') {
    if (!partyFull) {
      buttons.push({ text: 'Add to Party', primary: true, onclick: () => {
        me.party.push(c);
        delete me.creatureStorage[idx];
        savePlayer(); renderPartyPanel(); closeModal();
      }});
    } else {
      // Party full → offer Swap. One click opens picker, one click completes swap.
      buttons.push({ text: 'Swap with Party Member', primary: true, onclick: () => openSwapPicker(c, idx) });
    }
  }
  if (myBase && (myBase.maxTrainers || 0) > Object.keys(myBase.assignedTrainers || {}).length) {
    buttons.push({ text: 'Assign to Training', onclick: () => { assignTrainer(c.id); closeModal(); }});
  }
  buttons.push({ text: 'Rename', onclick: () => renameCreature(c, source, idx) });
  buttons.push({ text: 'Release', danger: true, onclick: () => releaseCreature(source, idx) });
  buttons.push({ text: 'Close', onclick: () => closeModal() });

  openModal({
    title: `${sp.e || sp.g} ${c.name || sp.n}`,
    wide: true,
    bodyHTML: `
      <div class="cd-wrap">
        <div class="cd-col">
          <div class="cd-big-emoji">${sp.e || sp.g}</div>
          <div class="cd-types">${sp.tArr.map(t => `<span class="t-${t} big">${t}</span>`).join(" ")}</div>
          <div class="muted">Level ${c.lvl} · ${c.xp} XP</div>
          <div class="muted small">IV score: ${ivAvg}%</div>
          <div class="muted small">${evoTxt}</div>
        </div>
        <div class="cd-col">
          <div class="cd-stats">
            <div class="stat-row"><span>HP</span><span>${c.hp}/${maxHp}</span></div>
            <div class="stat-row"><span>Atk</span><span>${atk}</span></div>
            <div class="stat-row"><span>Def</span><span>${def}</span></div>
            <div class="stat-row"><span>Spd</span><span>${spd}</span></div>
          </div>
          <div class="cd-moves">${movesHTML}</div>
        </div>
      </div>
    `,
    buttons
  });
}

function openSwapPicker(storedCreature, storageIdx) {
  // Show party slots; tapping one swaps that party member to storage and the stored creature to that slot.
  let html = '<div class="muted small">Pick which party member to swap out:</div><div class="swap-list">';
  for (let i = 0; i < me.party.length; i++) {
    const p = me.party[i];
    const psp = SPECIES[p.species];
    if (!psp) continue;
    const pMax = p.maxHp || calcStat('hp', psp.s[0], p.ivs.hp, p.lvl);
    html += `
      <div class="swap-row" data-slot="${i}" style="display:flex;align-items:center;gap:10px;padding:8px;border-bottom:1px solid #3a2410;cursor:pointer;">
        <div style="font-size:28px;">${psp.e || psp.g}</div>
        <div style="flex:1;">
          <div><b>${p.name || psp.n}</b> · Lv ${p.lvl}</div>
          <div class="small muted">HP ${p.hp}/${pMax}</div>
        </div>
        <div style="font-size:24px;">⇄</div>
        <div style="font-size:28px;">${SPECIES[storedCreature.species].e || SPECIES[storedCreature.species].g}</div>
      </div>`;
  }
  html += '</div>';
  openModal({
    title: 'Swap Creature',
    wide: true,
    bodyHTML: html,
    buttons: [{ text: 'Cancel', onclick: () => closeModal() }],
    onBody: () => {
      document.querySelectorAll('[data-slot]').forEach(n => {
        n.onclick = () => {
          const slot = parseInt(n.dataset.slot);
          const partyMember = me.party[slot];
          if (!partyMember) return;
          // Swap: party member goes to storage, stored creature goes to party
          me.creatureStorage[partyMember.id] = partyMember;
          me.party[slot] = storedCreature;
          delete me.creatureStorage[storageIdx];
          savePlayer();
          addLog(`Swapped ${SPECIES[partyMember.species].n} → storage, ${SPECIES[storedCreature.species].n} → party.`, 'good');
          closeModal();
          renderPartyPanel();
        };
      });
    }
  });
}

function renameCreature(c, source, idx) {
  const nn = prompt('New name (max 16 chars):', c.name || SPECIES[c.species].n);
  if (!nn) return;
  c.name = nn.slice(0, 16);
  savePlayer();
  renderPartyPanel();
  closeModal();
}

function releaseCreature(source, idx) {
  if (!confirm('Release this creature forever? Cannot undo.')) return;
  if (source === 'party') me.party.splice(idx, 1);
  else delete me.creatureStorage[idx];
  savePlayer();
  renderPartyPanel();
  closeModal();
  addLog('Released.', 'info');
}

function tryHatchEgg(eid) {
  const egg = me.eggs[eid];
  if (!egg) return;
  if (Date.now() < egg.hatchAt) {
    addLog('Not ready yet.', 'info');
    return;
  }
  const baby = makeCreatureInstance(egg.species, 1, egg.ivs);
  if (me.party.length < PARTY_SIZE) me.party.push(baby);
  else me.creatureStorage[baby.id] = baby;
  delete me.eggs[eid];
  me.seen[egg.species] = { seen: true, caught: true };
  addLog(`🎉 ${SPECIES[egg.species].n} hatched!`, 'good');
  savePlayer();
  renderPartyPanel();
}

function assignTrainer(cid) {
  if (!myBase.assignedTrainers) myBase.assignedTrainers = {};
  if (Object.keys(myBase.assignedTrainers).length >= (myBase.maxTrainers||0)) {
    addLog('Training posts full.', 'warn');
    return;
  }
  myBase.assignedTrainers[cid] = { since: Date.now() };
  saveBase();
  addLog(`Creature assigned to training. +${TRAIN_XP_PER_MIN} XP/min offline.`, 'good');
}

// PANEL: DEX
// ============================================================
function renderDexPanel() {
  const el = document.getElementById('tab-crit');
  if (!el || !me) return;
  const seen = me.seen || {};
  const seenCount = Object.values(seen).filter(s => s.seen).length;
  const caughtCount = Object.values(seen).filter(s => s.caught).length;
  const total = Object.keys(SPECIES).length;
  // Group by type
  const byType = {};
  for (const [k, sp] of Object.entries(SPECIES)) {
    const mainType = sp.t[0];
    if (!byType[mainType]) byType[mainType] = [];
    byType[mainType].push([k, sp]);
  }
  let html = `<div class="panel-sec"><div class="sec-head">Bestiary</div>
    <div class="dex-stats">Seen: ${seenCount}/${total} · Caught: ${caughtCount}/${total}</div>
    <div class="bar"><div class="bar-fill xp" style="width:${Math.round((caughtCount/total)*100)}%"></div></div>
  </div>`;
  for (const [t, arr] of Object.entries(byType)) {
    html += `<div class="panel-sec"><div class="sec-head"><span class="t-${t}">${t}</span></div><div class="dex-grid">`;
    for (const [k, sp] of arr) {
      const state = seen[k];
      const cls = state?.caught ? 'caught' : state?.seen ? 'seen' : 'unknown';
      const displayEmoji = state?.seen ? sp.e : '❓';
      const displayName = state?.seen ? sp.n : '???';
      html += `<div class="dex-cell ${cls}" title="${displayName}"><div class="cr-emoji">${displayEmoji}</div><div class="small">${displayName}</div></div>`;
    }
    html += `</div></div>`;
  }
  el.innerHTML = html;
}

  // Crafting stations require being inside your base
  const insideOwnBase = me.insideBase === me.nickname;
  const stationsAvail = { workbench: true };  // workbench is basic anywhere

    for (const [slot, key] of Object.entries(myBase.equipment)) {
      if (key) stationsAvail[key] = true;
    }
  }
  let html = `<div class="panel-sec"><div class="sec-head">Crafting Stations</div>`;
  if (!insideOwnBase) {
    html += `<div class="muted">Most stations require being inside your base. You can use basic workbench anywhere.</div>`;
  }
  const stationDefs = [
    { key: 'workbench', name: '🪵 Workbench', desc: 'Wood tools, basic items', alwaysOn: true },
    { key: 'copper_anvil', name: '⚒ Copper Anvil', desc: 'Copper tools & weapons' },
    { key: 'iron_forge', name: '🔥 Iron Forge', desc: 'Iron tier & armor' },
    { key: 'gold_smith', name: '✨ Gold Smithy', desc: 'Gold tier & trinkets' },
    { key: 'apothecary', name: '🧪 Apothecary', desc: 'Potions & elixirs' },

function openCraftStation(stationKey) {
  const stationRecipes = Object.entries(RECIPES).filter(([k, r]) => r.station === stationKey);
  if (!stationRecipes.length) {
    openModal({ title: 'Empty', bodyHTML: '<div class="muted">No recipes available here.</div>', buttons: [{ text: 'Close', onclick: () => closeModal() }] });
    return;
  }
  let html = '<div class="craft-list">';
  for (const [k, r] of stationRecipes) {
    const it = ITEMS[k];
    if (!it) continue;
    const costHTML = Object.entries(r.cost).map(([ck, cq]) => {
      const cit = ITEMS[ck];
      const have = me.inv[ck] || 0;
      return `<span class="cost-tag ${have >= cq ? 'ok' : 'bad'}">${cit?.emoji || ''}${cit?.n || ck} ${have}/${cq}</span>`;
    }).join(' ');
    const canCraft = Object.entries(r.cost).every(([ck, cq]) => (me.inv[ck] || 0) >= cq);
    const lvl = levelFromXp(me.xp);
    const lvlOk = !r.lvlReq || lvl >= r.lvlReq;
    html += `
      <div class="recipe">
        <div class="rec-emoji">${it.emoji || '📦'}</div>
        <div class="rec-main">
          <div class="rec-name">${it.n}</div>
          <div class="rec-desc muted small">${it.desc || ''}</div>
          <div class="rec-cost">${costHTML}</div>
          ${r.lvlReq ? `<div class="small ${lvlOk ? 'muted' : 'warn'}">Requires Lv ${r.lvlReq}</div>` : ''}
        </div>
        <button class="btn primary ${(canCraft && lvlOk) ? '' : 'disabled'}" data-craft="${k}" ${(canCraft && lvlOk) ? '' : 'disabled'}>Craft</button>
      </div>
    `;
  }
  html += '</div>';
  openModal({
    title: `Craft: ${stationKey.replace('_', ' ')}`,
    wide: true,
    bodyHTML: html,
    buttons: [{ text: 'Close', onclick: () => closeModal() }],
    onBody: () => {
      document.querySelectorAll('[data-craft]').forEach(n => {
        n.onclick = () => craftItem(n.dataset.craft);
      });
    }
  });
}

function craftItem(itemKey) {
  const r = RECIPES[itemKey];
  if (!r) return;
  for (const [ck, cq] of Object.entries(r.cost)) {
    if ((me.inv[ck] || 0) < cq) {
      addLog('Not enough materials.', 'warn');
      return;
    }
  }
  for (const [ck, cq] of Object.entries(r.cost)) {
    me.inv[ck] -= cq;
    if (me.inv[ck] <= 0) delete me.inv[ck];
  }
  const qty = r.qty || 1;
  me.inv[itemKey] = (me.inv[itemKey] || 0) + qty;
  me.xp += (r.xp || 10);
  addLog(`Crafted ${ITEMS[itemKey]?.n} x${qty}. +${r.xp || 10} XP`, 'good');
  savePlayer();
  // Re-open to refresh counts
  const station = r.station;
  closeModal();
  setTimeout(() => openCraftStation(station), 100);
  renderInventoryPanel();
  renderStatsPanel();
}

let _pendingStructure = null;
function selectStructureToPlace(key) {
  _pendingStructure = key;
  addLog(`Click an empty tile inside your base to place ${STRUCTURES[key].name}.`, 'info');
  showHint(`Placing: ${STRUCTURES[key].emoji} ${STRUCTURES[key].name} — click an empty interior tile. (Esc cancels)`);
}

function tryPlaceStructure(ix, iy) {
  // ix, iy are INTERIOR local coords (0..size-1)
  if (!_pendingStructure || !myBase) return false;
  if (!interior) {
    addLog('Must be inside your base.', 'warn');
    _pendingStructure = null;
    showHint('');
    return false;
  }
  const typeKey = _pendingStructure;
  const sdef = STRUCTURES[typeKey];
  if (!sdef) { _pendingStructure = null; return false; }
  const lvlDef = BASE_LEVELS[myBase.level || 1];
  const size = lvlDef.size;
  // bounds
  if (ix < 0 || iy < 0 || ix >= size || iy >= size) { addLog('Out of bounds.', 'warn'); return false; }
  // Don't place on door
  if (ix === Math.floor(size/2) && iy === size - 1) { addLog('Can\'t block the door.', 'warn'); return false; }
  // Don't place on equipment
  const eqList = Object.keys(myBase.equipment || {}).filter(k => CORE_EQUIPMENT[k] && myBase.equipment[k]);
  for (let i = 0; i < eqList.length; i++) {
    const col = i % (size - 2), row = Math.floor(i / (size - 2));
    if (ix === 1 + col && iy === 1 + row) { addLog('Equipment occupies that tile.', 'warn'); return false; }
  }
  const tileKey = `${ix}_${iy}`;
  if (myBase.structures?.[tileKey]) { addLog('Tile occupied.', 'warn'); return false; }
  // Check caps
  const structCount = Object.keys(myBase.structures || {}).length;
  if (structCount >= lvlDef.maxStructures) { addLog('Base structure cap reached. Upgrade to add more.', 'warn'); _pendingStructure = null; showHint(''); return false; }
  if (sdef.kind === 'farm') {
    const farmCount = Object.values(myBase.structures || {}).filter(s => STRUCTURES[s.type]?.kind === 'farm').length;
    if (farmCount >= lvlDef.maxFarms) { addLog('Farm cap reached.', 'warn'); _pendingStructure = null; showHint(''); return false; }
  }
  if (sdef.kind === 'trainer') {
    const count = Object.values(myBase.structures || {}).filter(s => STRUCTURES[s.type]?.kind === 'trainer').length;
    if (count >= lvlDef.maxTrainers) { addLog('Trainer post cap reached.', 'warn'); _pendingStructure = null; showHint(''); return false; }
  }
  if (sdef.kind === 'guardian') {
    const count = Object.values(myBase.structures || {}).filter(s => STRUCTURES[s.type]?.kind === 'guardian').length;
    if (count >= (lvlDef.maxGuardians || 0)) { addLog('Guardian post cap reached.', 'warn'); _pendingStructure = null; showHint(''); return false; }
  }
  if (sdef.kind === 'tower') {
    const count = Object.values(myBase.structures || {}).filter(s => STRUCTURES[s.type]?.kind === 'tower').length;
    if (count >= (lvlDef.maxTowers || 0)) { addLog('Tower cap reached.', 'warn'); _pendingStructure = null; showHint(''); return false; }
  }
  // Check cost
  for (const [ck, cq] of Object.entries(sdef.cost)) {
    if ((me.inv[ck] || 0) < cq) { addLog('Not enough materials.', 'warn'); _pendingStructure = null; showHint(''); return false; }
  }
  // Pay
  for (const [ck, cq] of Object.entries(sdef.cost)) {
    me.inv[ck] -= cq;
    if (me.inv[ck] <= 0) delete me.inv[ck];
  }
  if (!myBase.structures) myBase.structures = {};
  myBase.structures[tileKey] = { type: typeKey, hp: sdef.hp || 100, placedAt: Date.now() };
  recomputeBaseCaps();
  saveBase();
  savePlayer();
  addLog(`Placed ${sdef.name}.`, 'good');
  _pendingStructure = null;
  showHint('');
  renderBasePanel();
  renderAll();
  return true;
}

function recomputeBaseCaps() {
  if (!myBase) return;
  const trainerCount = Object.values(myBase.structures || {}).filter(s => STRUCTURES[s.type]?.kind === 'trainer').length;
  myBase.maxTrainers = trainerCount;
}

function upgradeBase() {
  const lvl = myBase.level || 1;
  const nextDef = BASE_LEVELS[lvl + 1];
  if (!nextDef) return;
  if (!canAfford(nextDef.upgradeCost)) { addLog('Not enough materials.', 'warn'); return; }
  payCost(nextDef.upgradeCost);
  myBase.level = lvl + 1;
  saveBase();
  savePlayer();
  addLog(`Base upgraded to ${nextDef.name}!`, 'good');
  renderBasePanel();
  renderInventoryPanel();
  renderStatsPanel();
  updateHUD();
}

function openInstallEquipment() {
  const slots = ['slot1','slot2','slot3','slot4'];
  const lvlDef = BASE_LEVELS[myBase.level || 1];
  const slotsAvail = lvlDef.equipSlots || 1;
  const installedKeys = Object.values(myBase.equipment || {}).filter(Boolean);
  let html = '<div class="equip-install-list">';
  for (const [k, it] of Object.entries(ITEMS)) {
    if (!it.installable) continue;
    const owned = (me.inv[k] || 0) > 0;
    const already = installedKeys.includes(k);
    html += `<div class="ei-row">
      <div class="ei-emoji">${it.emoji}</div>
      <div class="ei-info">
        <div>${it.n}</div>
        <div class="muted small">${it.desc || ''}</div>
      </div>
      ${already ? '<span class="muted">installed</span>' : 
        owned ? `<button class="btn primary" data-install="${k}">Install</button>` :
        '<span class="muted">not owned</span>'}
    </div>`;
  }
  html += '</div>';
  openModal({
    title: `Install Equipment (${installedKeys.length}/${slotsAvail} slots)`,
    wide: true,
    bodyHTML: html,
    buttons: [{ text: 'Close', onclick: () => closeModal() }],
    onBody: () => {
      document.querySelectorAll('[data-install]').forEach(n => {
        n.onclick = () => {
          const k = n.dataset.install;
          const installed = Object.values(myBase.equipment || {}).filter(Boolean).length;
          if (installed >= slotsAvail) { addLog('No free equipment slots. Upgrade base.', 'warn'); return; }
          if (!myBase.equipment) myBase.equipment = {};
          const slotKey = 'slot' + (installed + 1);
          myBase.equipment[slotKey] = k;
          me.inv[k]--;
          if (me.inv[k] <= 0) delete me.inv[k];
          saveBase(); savePlayer();
          addLog(`Installed ${ITEMS[k].n}.`, 'good');
          closeModal();
          renderBasePanel();
        };
      });
    }
  });
}

function relocateBase() {
  if (!confirm(`Relocate base? Cost: ${BASE_MOVE_COST_GOLD}g. All structures destroyed.`)) return;
  if (me.gold < BASE_MOVE_COST_GOLD) { addLog('Not enough gold.', 'warn'); return; }
  me.gold -= BASE_MOVE_COST_GOLD;
  me.hasBase = false;
  myBase = null;
  remove(ref(db, `bases/${me.nickname}`));
  savePlayer();
  addLog('Base relocated. Walk to new spot and press E.', 'good');
  renderBasePanel();
}


// ============================================================
// CROP PLANTING (when player clicks a farm plot)
// ============================================================
function openFarmPlot(tx, ty) {
  if (!myBase) return;
  const tileKey = `${tx},${ty}`;
  const plot = myBase.structures?.[tileKey];
  if (!plot || plot.key !== 'farm_plot') return;
  if (plot.crop && Date.now() >= plot.cropDoneAt) {
    // Harvest
    const cd = CROPS[plot.crop];
    const yields = cd.yields || {};
    for (const [y, q] of Object.entries(yields)) {
      me.inv[y] = (me.inv[y] || 0) + q;
      addLog(`+${q} ${ITEMS[y]?.n || y}`, 'good');
    }
    plot.crop = null;
    plot.cropDoneAt = 0;
    saveBase();
    savePlayer();
    renderBasePanel();
    renderAll();
    return;
  }
  if (plot.crop && Date.now() < plot.cropDoneAt) {
    const secLeft = Math.ceil((plot.cropDoneAt - Date.now()) / 1000);
    openModal({
      title: 'Growing',
      bodyHTML: `<div>🌱 ${CROPS[plot.crop].name}</div><div class="muted">Ready in ${secLeft}s</div>`,
      buttons: [{ text: 'OK', onclick: () => closeModal() }]
    });
    return;
  }
  // Empty plot — choose seed
  let html = '<div class="seed-list">';
  for (const [k, cd] of Object.entries(CROPS)) {
    const have = me.inv[cd.seed] || 0;
    html += `<div class="seed-row">
      <div>${ITEMS[cd.seed]?.emoji || '🌱'} ${cd.name}</div>
      <div class="muted small">${cd.growMin}min · yields ${Object.entries(cd.yields).map(([y,q]) => `${q} ${ITEMS[y]?.n||y}`).join(', ')}</div>
      <button class="btn primary ${have > 0 ? '' : 'disabled'}" data-plant="${k}" ${have > 0 ? '' : 'disabled'}>Plant (have ${have})</button>
    </div>`;
  }
  html += '</div>';
  openModal({
    title: 'Plant Crop',
    bodyHTML: html,
    buttons: [{ text: 'Close', onclick: () => closeModal() }],
    onBody: () => {
      document.querySelectorAll('[data-plant]').forEach(n => {
        n.onclick = () => {
          const k = n.dataset.plant;
          const cd = CROPS[k];
          if ((me.inv[cd.seed] || 0) <= 0) return;
          me.inv[cd.seed]--;
          if (me.inv[cd.seed] <= 0) delete me.inv[cd.seed];
          plot.crop = k;
          plot.cropDoneAt = Date.now() + cd.growMin * 60_000;
          saveBase();
          savePlayer();
          closeModal();
          addLog(`Planted ${cd.name}.`, 'good');
          renderBasePanel();
          renderAll();
        };
      });
    }
  });
}

function renderRaidPanel() {

  else {
    logHTML = log.slice(-20).reverse().map(r => {
      const cls = r.defended ? 'defended' : 'breached';
