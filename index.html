        <div class="small">${r.source} (power ${r.power})${r.losses ? ` — Lost: ${r.losses}` : ''}</div>
      </div>`;
    }).join('');
  }
  el.innerHTML = `
    <div class="panel-sec">
      <div class="sec-head">Your Defenses</div>
      <div class="row2"><span>Power</span><span class="red">${calcBaseDefensePower()}</span></div>
      <div class="muted small">More walls, towers, and guardians = higher defense. Raids happen while you're offline.</div>
    </div>
    <div class="panel-sec">
      <div class="sec-head">Raid Log</div>
      ${logHTML}
    </div>
    <div class="panel-sec">
      <div class="sec-head">Raid Another Player</div>
      <div class="muted small">Pick a target. Your party fights their defenses + guardians. Win = loot. Lose = heavy creature damage.</div>
      <button class="btn warn" id="btn-find-target">Find Target</button>
    </div>
  `;
  document.getElementById('btn-find-target').onclick = openPvpRaidTargetList;
}

async function openPvpRaidTargetList() {
  const basesSnap = await get(ref(db, 'bases'));
  const bases = basesSnap.val() || {};
  const myLvl = levelFromXp(me.xp);
  const targets = Object.entries(bases)
    .filter(([nick]) => nick !== me.nickname)
    .map(([nick, b]) => ({ nick, b, defPower: estimateDefPower(b) }))
    .sort((a, b) => a.defPower - b.defPower)
    .slice(0, 10);
  if (!targets.length) {
    openModal({ title: 'No Targets', bodyHTML: '<div class="muted">No other players have bases yet.</div>', buttons: [{ text: 'OK', onclick: () => closeModal() }] });
    return;
  }
  let html = '<div class="target-list">';
  for (const t of targets) {
    const online = players && players[t.nick];
    html += `<div class="target-row">
      <div>
        <div>${t.nick} ${online ? '<span class="green small">online</span>' : '<span class="muted small">offline</span>'}</div>
        <div class="muted small">Base Lv ${t.b.level || 1} · Def ${t.defPower}</div>
      </div>
      <button class="btn warn" data-raid-tgt="${t.nick}">Raid</button>
    </div>`;
  }
  html += '</div>';
  openModal({
    title: 'PvP Raid Targets',
    wide: true,
    bodyHTML: html,
    buttons: [{ text: 'Close', onclick: () => closeModal() }],
    onBody: () => {
      document.querySelectorAll('[data-raid-tgt]').forEach(n => {
        n.onclick = () => initiatePvpRaid(n.dataset.raidTgt);
      });
    }
  });
}

function estimateDefPower(b) {
  if (!b.structures) return 0;
  let pw = 0;
  for (const s of Object.values(b.structures)) {
    const sdef = STRUCTURES[s.key];
    if (!sdef) continue;
    pw += (sdef.hp || 0) / 10 + (sdef.atk || 0) * 1.5;
  }
  return Math.round(pw);
}

async function initiatePvpRaid(targetNick) {
  const basesSnap = await get(ref(db, `bases/${targetNick}`));
  const targetBase = basesSnap.val();
  if (!targetBase) { addLog('Base gone.', 'warn'); return; }
  closeModal();
  // Calculate raid outcome
  const myPower = calcPartyPower();
  const theirPower = estimateDefPower(targetBase) + 20;
  const winChance = clamp(myPower / (myPower + theirPower), 0.1, 0.9);
  const roll = Math.random();
  const won = roll < winChance;
  openModal({
    title: `Raiding ${targetNick}`,
    bodyHTML: `<div>${won ? '💥 Breach successful!' : '🛡 Defenses held!'}</div>
      <div class="muted small">Your power: ${myPower} · Their defense: ${theirPower} · Win chance: ${Math.round(winChance*100)}%</div>
      <div class="muted small">${won ? 'Looting resources...' : 'Your creatures took heavy damage.'}</div>`,
    buttons: [{ text: 'OK', onclick: () => closeModal() }]
  });
  if (won) {
    // Loot: take some resources from their base (via raidLog on their side)
    const lootKeys = ['wood','stone','copper','iron','gold_o','berry','herb'];
    const gained = {};
    for (const k of lootKeys) {
      const give = randInt(2, 8);
      me.inv[k] = (me.inv[k] || 0) + give;
      gained[k] = give;
    }
    me.gold += randInt(20, 60);
    // Damage their structures
    const lossDesc = ['small amount of resources'];
    const dmgList = Object.entries(targetBase.structures || {}).sort(() => Math.random() - 0.5).slice(0, 3);
    for (const [tk, s] of dmgList) {
      const sdef = STRUCTURES[s.key];
      if (!sdef) continue;
      s.hp -= randInt(30, 80);
      if (s.hp <= 0) delete targetBase.structures[tk];
    }
    // Append to their raid log
    if (!targetBase.raidLog) targetBase.raidLog = [];
    targetBase.raidLog.push({ at: Date.now(), source: `⚔ ${me.nickname} (PvP)`, power: myPower, defended: false, losses: 'some resources & structures' });
    set(ref(db, `bases/${targetNick}`), targetBase);
    addLog(`Raid won! Looted gold + resources.`, 'good');
  } else {
    for (const c of me.party) {
      c.hp = Math.max(1, Math.floor(c.hp * 0.3));
    }
    me.hp = Math.max(1, Math.floor(me.hp * 0.5));
    // Log on their side too
    if (!targetBase.raidLog) targetBase.raidLog = [];
    targetBase.raidLog.push({ at: Date.now(), source: `⚔ ${me.nickname} (PvP)`, power: myPower, defended: true, losses: '' });
    set(ref(db, `bases/${targetNick}`), targetBase);
    addLog('Raid failed. Your party is wounded.', 'warn');
  }
  savePlayer();
  renderAll();
  renderRaidPanel();
}

function calcPartyPower() {
  let pw = 0;
  for (const c of me.party) {
    const sp = SPECIES[c.species];
    if (!sp) continue;
    pw += calcStat('atk', sp.b.atk, c.ivs.atk, c.lvl) + calcStat('def', sp.b.def, c.ivs.def, c.lvl) / 2 + c.lvl * 3;
  }
  return Math.round(pw);
}

function getBreedCompatibility(p1, p2) {
  if (p1.id === p2.id) return { ok: false, reason: 'Same creature' };
  const sp1 = SPECIES[p1.species];
  const sp2 = SPECIES[p2.species];
  const shared = sp1.tArr.find(t => sp2.tArr.includes(t));
  if (!shared) return { ok: false, reason: 'No shared element' };
  return { ok: true, sharedType: shared };
}

function startBreeding(p1, p2) {
  const compat = getBreedCompatibility(p1, p2);
  if (!compat.ok) return;
  // Pick offspring species: random of p1/p2 species' base form
  const choice = Math.random() < 0.5 ? p1 : p2;
  let baseSp = choice.species;
  // Walk back to base form by checking if any species evolves to this
  for (const [k, sp] of Object.entries(SPECIES)) {
    if (sp.evo?.to === baseSp) baseSp = k;
  }
  // IV inheritance: 55% better parent, 45% worse, +5 mutation (capped 31)
  const ivs = {};
  for (const stat of ['hp','atk','def','spd']) {
    const better = p1.ivs[stat] >= p2.ivs[stat] ? p1 : p2;
    const worse = better === p1 ? p2 : p1;
    const src = Math.random() < 0.55 ? better : worse;
    let iv = src.ivs[stat];
    if (Math.random() < 0.10) iv = Math.min(31, iv + 5);
    ivs[stat] = iv;
  }
  const eid = 'egg_' + Date.now() + '_' + randInt(100,999);
  me.eggs[eid] = { species: baseSp, hatchAt: Date.now() + EGG_HATCH_MS, ivs };
  me.breedingPair = null;
  savePlayer();
  closeModal();
  addLog(`🥚 Breeding started! Egg ready in ${EGG_HATCH_MS/1000}s.`, 'good');
  renderPartyPanel();
}

      }});

  buttons.push({ text: 'Leave', onclick: () => closeModal() });

let worldBossState = null;
function maybeSpawnWorldBoss() {
  // World boss at center (180,180), respawns every hour
  if (!worldBossState) worldBossState = { defeatedAt: 0 };
  const ready = Date.now() - (worldBossState.defeatedAt || 0) > WORLD_BOSS_RESPAWN_MS;
  if (!ready) return null;
  // Boss is at (180, 180) standing as a tough wild encounter
  const bossAnchor = 'worldboss_center';
  return { x: 180, y: 180, anchorId: bossAnchor, species: 'arcwyrm', lvl: 30, isBoss: true };
}

function checkWorldBossInteraction() {
  // If player is adjacent to (180,180) and boss is ready
  const wb = maybeSpawnWorldBoss();
  if (!wb) return false;
  const dx = Math.abs(me.x - wb.x);
  const dy = Math.abs(me.y - wb.y);
  if (dx <= 1 && dy <= 1) {
    showHint('⚠ WORLD BOSS nearby. Press E to engage (hard fight!)');
  }
  return true;
}

// GAME TICK LOOP (extends existing tickLoop work)
// ============================================================
let _lastTickTs = Date.now();
let _autoSaveTs = Date.now();
function mainLoop() {
  const now = Date.now();
  const dt = (now - _lastTickTs) / 1000;
  _lastTickTs = now;
  // HP regen out of battle
  if (!activeBattle && me && me.hp > 0) {
    const maxHp = 80 + levelFromXp(me.xp) * 12 + (me.armorBonus || 0);
    if (me.hp < maxHp && Math.random() < 0.05) me.hp = Math.min(maxHp, me.hp + 1);
  }
  // Update HUD periodically
  updateTimeHUD();
  updateHUD();
  // Autosave every 15s
  if (now - _autoSaveTs > 15_000) {
    _autoSaveTs = now;
    if (me) savePlayer();
    if (myBase) saveBase();
  }
  // Tick crops ready notifications
  if (myBase && Math.random() < 0.1) {
    const anyReady = Object.values(myBase.structures || {}).some(s => s.key === 'farm_plot' && s.crop && Date.now() >= s.cropDoneAt);
    if (anyReady && document.querySelector('.tab[data-tab="base"].active')) renderBasePanel();
  }
  requestAnimationFrame(mainLoop);
}

const _origTryInteract = tryInteract;
tryInteract = function() {
  // If a pending structure placement is queued, try placing at player's feet
  if (_pendingStructure && interior) {
    if (tryPlaceStructure(me.interiorX, me.interiorY)) return;
  }
  // World boss check (only if not in interior)
  if (!interior && Math.abs(me.x - 180) <= 1 && Math.abs(me.y - 180) <= 1) {

    if (wb) {
      startWildBattle('worldboss_center', { species: 'arcwyrm', lvl: 30, x: 180, y: 180, isBoss: true });
      return;
    }
  }
  _origTryInteract.call(this);
};

// Override onCanvasClick to handle structure placement on click
const _origCanvasClick = onCanvasClick;
onCanvasClick = function(e) {
  if (_pendingStructure && interior && myBase) {
    const canvas = document.getElementById('world');
    const rect = canvas.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    const size = BASE_LEVELS[myBase.level || 1].size;
    const ts = Math.floor(canvas.width / 13);
    const gridOffset = Math.floor((13 - size) / 2);
    const ix = Math.floor(cx / ts) - gridOffset;
    const iy = Math.floor(cy / ts) - gridOffset;
    tryPlaceStructure(ix, iy);
    return;
  }
  if (_pendingStructure && !interior) {
    addLog('Enter your base first to place structures.', 'warn');
    return;
  }
  _origCanvasClick.call(this, e);
};

// ============================================================
// BASE INTERIOR — movement + interaction
// ============================================================
function moveBaseInteriorBy(dx, dy) {
  if (!myBase) return;
  const size = BASE_LEVELS[myBase.level || 1].size;
  const nx = (me.interiorX || Math.floor(size/2)) + dx;
  const ny = (me.interiorY || Math.floor(size/2)) + dy;
  // bounds
  if (nx < 0 || ny < 0 || nx >= size || ny >= size) return;
  // Check if tile has a blocking structure
  const tileKey = `${nx}_${ny}`;
  const st = myBase.structures?.[tileKey];
  if (st) {
    const sdef = STRUCTURES[st.type];
    if (sdef && sdef.blocks) return;
  }
  // Check door: bottom-middle tile exits the base
  const doorX = Math.floor(size / 2);
  const doorY = size - 1;
  if (nx === doorX && ny === doorY) {
    // Exit base
    interior = false;
    me.insideBase = null;
    me.interiorX = Math.floor(size / 2);
    me.interiorY = Math.floor(size / 2) - 1;
    me.x = myBase.x;
    me.y = myBase.y + 1;
    savePlayer();
    addLog('Left base.', 'info');
    renderAll();
    return;
  }
  me.interiorX = nx;
  me.interiorY = ny;
  renderInterior();
}

function tryInteractInterior() {
  if (!myBase) return;
  const size = BASE_LEVELS[myBase.level || 1].size;
  // Check structures adjacent or on current tile
  const checkCoords = [[me.interiorX, me.interiorY], [me.interiorX, me.interiorY-1], [me.interiorX, me.interiorY+1], [me.interiorX-1, me.interiorY], [me.interiorX+1, me.interiorY]];
  for (const [cx, cy] of checkCoords) {
    const tk = `${cx}_${cy}`;
    const st = myBase.structures?.[tk];
    if (st) {
      const sdef = STRUCTURES[st.type];
      if (sdef && sdef.kind === 'farm') { openFarmPlotInterior(cx, cy); return; }
      if (sdef && sdef.kind === 'trainer') { openTrainerPost(); return; }
      if (sdef && sdef.kind === 'guardian') { openGuardianPost(cx, cy); return; }
      if (sdef && sdef.openable) { addLog(`${sdef.name} opens.`, 'info'); return; }
    }
  }
  // Check if standing on equipment tile
  const gridOffset = 0;
  const eqList = Object.keys(myBase.equipment || {}).filter(k => CORE_EQUIPMENT[k] && myBase.equipment[k]);
  eqList.forEach((k, i) => {
    const col = i % (size - 2);
    const row = Math.floor(i / (size - 2));
    const ex = 1 + col, ey = 1 + row;
    if (me.interiorX === ex && me.interiorY === ey) {
      openEquipment(k);
    }
  });
}

function openEquipment(eqKey) {
  const def = CORE_EQUIPMENT[eqKey];
  if (!def) return;
  if (eqKey === 'bed') { tryRest(); return; }
  if (eqKey === 'workbench') { openCraftStation('workbench'); return; }
  if (eqKey === 'forge') { openCraftStation('forge'); return; }
  if (eqKey === 'alchemy') { openCraftStation('alchemy'); return; }
  if (eqKey === 'breeding') { openBreedingMenu(); return; }
  if (eqKey === 'storage') { openStorageChest(); return; }
  if (eqKey === 'incubator') { renderPartyPanel(); document.querySelector('.tab[data-tab="party"]')?.click(); return; }
  if (eqKey === 'map_table') { addLog('Map table — feature coming soon.', 'info'); return; }
  if (eqKey === 'research') { addLog('Research desk — feature coming soon.', 'info'); return; }
  addLog(`${def.name} activated.`, 'info');
}

function openStorageChest() {
  openModal({
    title: '📦 Storage',
    bodyHTML: '<div class="muted">Your creature storage auto-holds extras that don\'t fit in your party. View them in the Party tab.</div>',
    buttons: [{ text: 'OK', onclick: () => closeModal() }]
  });
}

function openFarmPlotInterior(cx, cy) {
  // Interior farm plot uses myBase.farms[key]
  const key = `${cx}_${cy}`;
  if (!myBase.farms) myBase.farms = {};
  const plot = myBase.farms[key] || {};
  if (plot.crop && plot.plantedAt) {
    const cd = CROPS[plot.crop];
    const doneAt = plot.plantedAt + cd.grow;
    if (Date.now() >= doneAt) {
      // Harvest
      for (const [y, q] of Object.entries(cd.yield || {})) {
        me.inv[y] = (me.inv[y] || 0) + q;
        addLog(`+${q} ${ITEMS[y]?.name || y}`, 'good');
      }
      plot.crop = null;
      plot.plantedAt = 0;
      delete myBase.farms[key];
      saveBase(); savePlayer();
      renderAll();
      return;
    } else {
      const secLeft = Math.ceil((doneAt - Date.now()) / 1000);
      openModal({
        title: 'Growing',
        bodyHTML: `<div>${cd.icon} ${cd.name}</div><div class="muted">Ready in ${secLeft}s</div>`,
        buttons: [{ text: 'OK', onclick: () => closeModal() }]
      });
      return;
    }
  }
  // Empty — choose seed
  let html = '<div class="seed-list">';
  for (const [k, cd] of Object.entries(CROPS)) {
    const have = me.inv[cd.seed] || 0;
    html += `<div class="seed-row" style="display:flex;align-items:center;gap:8px;padding:6px;border-bottom:1px solid #3a2410;">
      <div style="font-size:20px;">${cd.icon}</div>
      <div style="flex:1;">
        <div>${cd.name}</div>
        <div class="muted small">${Math.round(cd.grow/60000)}min · ${Object.entries(cd.yield).map(([y,q]) => `${q} ${ITEMS[y]?.name||y}`).join(', ')}</div>
      </div>
      <button class="btn primary ${have > 0 ? '' : 'disabled'}" data-plant="${k}" ${have > 0 ? '' : 'disabled'}>Plant (${have})</button>
    </div>`;
  }
  html += '</div>';
  openModal({
    title: 'Plant Crop',
    bodyHTML: html,
    buttons: [{ text: 'Close', onclick: () => closeModal() }],
    onBody: () => {
      document.querySelectorAll('[data-plant]').forEach(n => {
        n.onclick = () => {
          const k = n.dataset.plant;
          const cd = CROPS[k];
          if ((me.inv[cd.seed] || 0) <= 0) return;
          me.inv[cd.seed]--;
          if (me.inv[cd.seed] <= 0) delete me.inv[cd.seed];
          myBase.farms[key] = { crop: k, plantedAt: Date.now() };
          saveBase(); savePlayer();
          closeModal();
          addLog(`Planted ${cd.name}.`, 'good');
          renderAll();
        };
      });
    }
  });
}

function openTrainerPost() {
  const allCreatures = [...me.party, ...Object.values(me.creatureStorage || {})];
  if (!allCreatures.length) {
    openModal({ title: 'Training Post', bodyHTML: '<div class="muted">No creatures to train.</div>', buttons: [{ text: 'OK', onclick: () => closeModal() }] });
    return;
  }
  const trainerCap = myBase.maxTrainers || 0;
  const assigned = Object.keys(myBase.assignedTrainers || {});
  let html = `<div class="muted small">${assigned.length}/${trainerCap} slots used. Earns ${TRAIN_XP_PER_MIN} XP/min offline.</div><div class="train-list">`;
  for (const c of allCreatures) {
    const sp = SPECIES[c.species];
    if (!sp) continue;
    const isAssigned = assigned.includes(c.id);
    html += `<div class="train-row" style="display:flex;align-items:center;gap:8px;padding:6px;border-bottom:1px solid #3a2410;">
      <div style="font-size:24px;">${sp.e}</div>
      <div style="flex:1;">
        <div>${c.name || sp.n} · Lv ${c.lvl}</div>
        <div class="small muted">XP ${c.xp}</div>
      </div>
      <button class="btn ${isAssigned ? 'warn' : 'primary'}" data-tr="${c.id}">${isAssigned ? 'Stop' : (assigned.length < trainerCap ? 'Train' : 'Full')}</button>
    </div>`;
  }
  html += '</div>';
  openModal({
    title: 'Training Post',
    wide: true,
    bodyHTML: html,
    buttons: [{ text: 'Close', onclick: () => closeModal() }],
    onBody: () => {
      document.querySelectorAll('[data-tr]').forEach(n => {
        n.onclick = () => {
          const cid = n.dataset.tr;
          if (!myBase.assignedTrainers) myBase.assignedTrainers = {};
          if (myBase.assignedTrainers[cid]) {
            delete myBase.assignedTrainers[cid];
            addLog('Training stopped.', 'info');
          } else {
            if (Object.keys(myBase.assignedTrainers).length >= trainerCap) { addLog('All slots full.', 'warn'); return; }
            myBase.assignedTrainers[cid] = { since: Date.now() };
            addLog(`Training started.`, 'good');
          }
          saveBase();
          closeModal();
          setTimeout(openTrainerPost, 50);
        };
      });
    }
  });
}

function openGuardianPost(cx, cy) {
  const tk = `${cx}_${cy}`;
  const st = myBase.structures?.[tk];
  if (!st) return;
  const allCreatures = [...me.party, ...Object.values(me.creatureStorage || {})];
  let html = `<div class="muted small">Assign a creature as base guardian. Boosts defense.</div><div class="g-list">`;
  for (const c of allCreatures) {
    const sp = SPECIES[c.species];
    if (!sp) continue;
    html += `<div class="g-row" style="display:flex;align-items:center;gap:8px;padding:6px;border-bottom:1px solid #3a2410;">
      <div style="font-size:24px;">${sp.e}</div>
      <div style="flex:1;"><div>${c.name || sp.n} · Lv ${c.lvl}</div></div>
      <button class="btn primary" data-guard="${c.id}">Assign</button>
    </div>`;
  }
  html += '</div>';
  if (st.guardianId) {
    const g = allCreatures.find(c => c.id === st.guardianId);
    if (g) html = `<div>Current: ${SPECIES[g.species].e} ${g.name || SPECIES[g.species].n}</div><button class="btn warn" id="unassign-g">Unassign</button>` + html;
  }
  openModal({
    title: 'Guardian Post',
    wide: true,
    bodyHTML: html,
    buttons: [{ text: 'Close', onclick: () => closeModal() }],
    onBody: () => {
      document.querySelectorAll('[data-guard]').forEach(n => {
        n.onclick = () => {
          st.guardianId = n.dataset.guard;
          saveBase();
          addLog('Guardian assigned.', 'good');
          closeModal();
        };
      });
      const ua = document.getElementById('unassign-g');
      if (ua) ua.onclick = () => { delete st.guardianId; saveBase(); addLog('Guardian unassigned.', 'info'); closeModal(); };
    }
  });
}


// ============================================================
// ENTER BASE + PLAYER INTERACT
// ============================================================
function enterBase() {
  if (!myBase) return;
  interior = true;
  me.insideBase = me.nickname;
  const size = BASE_LEVELS[myBase.level || 1].size;
  me.interiorX = Math.floor(size / 2);
  me.interiorY = size - 2;
  savePlayer();
  addLog(`Entered ${BASE_LEVELS[myBase.level || 1].name}.`, 'info');
  renderAll();
}

function openPlayerInteract(otherNick, otherData) {
  const lvl = otherData.lvl || 1;
  const partyCount = Array.isArray(otherData.party) ? otherData.party.length : 0;
  openModal({
    title: otherNick,
    bodyHTML: `
      <div>Level ${lvl} · Party: ${partyCount}</div>
      <div class="muted small">Online player. Challenge them to a PvP battle.</div>
    `,
    buttons: [
      { text: 'Challenge to Battle', primary: true, onclick: () => { sendPvpChallenge(otherNick); closeModal(); }},
      { text: 'Close', onclick: () => closeModal() }
    ]
  });
}

function sendPvpChallenge(targetNick) {
  set(ref(db, `challenges/${targetNick}`), {
    from: me.nickname,
    kind: 'battle',
    at: Date.now()
  });
  addLog(`Challenge sent to ${targetNick}.`, 'info');
}

// ============================================================
// BOOT
// ============================================================
document.getElementById('enter-btn').onclick = attemptEnter;
document.getElementById('nick-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') attemptEnter();
});
if (!CONFIG_OK) document.getElementById('config-warn').style.display = 'block';

window.addEventListener('beforeunload', () => {
  if (db && nickname) {
    remove(ref(db, `online/${nickname}`));
    if (me) {
      set(ref(db, `players/${nickname}/lastSeen`), Date.now());
    }
  }
});
